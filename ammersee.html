<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ammersee">
<meta name="theme-color" content="#D4E6F4">
<title>Ammersee</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300A3E0'/><stop offset='100%25' stop-color='%23004B7A'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><path d='M20 80 L45 55 L65 65 L90 45 L115 60 L140 50 L160 65 L160 90 L20 90 Z' fill='%23ffffff' opacity='0.35'/><path d='M20 100 Q55 95, 90 100 T160 100' stroke='white' stroke-width='5' fill='none' stroke-linecap='round'/><path d='M20 118 Q55 113, 90 118 T160 118' stroke='white' stroke-width='4' fill='none' stroke-linecap='round' opacity='0.75'/><path d='M20 136 Q55 131, 90 136 T160 136' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' opacity='0.5'/></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #ECF3FA; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
  background: linear-gradient(180deg, #D4E6F4 0%, #ECF3FA 35%, #FFFFFF 70%);
  background-attachment: fixed;
  color: #0A1F2E;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding: max(env(safe-area-inset-top), 12px) 16px calc(env(safe-area-inset-bottom) + 80px);
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes welcomeFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.container { animation: fadeIn .35s ease; }

/* Loading */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 16px; text-align: center; }
.spinner { width: 26px; height: 26px; border: 2.5px solid rgba(0,128,184,0.15); border-top-color: #0080B8; border-radius: 50%; animation: spin .7s linear infinite; }
.loading-main { color: #0A1F2E; font-size: 15px; font-weight: 600; }
.loading-step { font-size: 12px; color: #8294A8; font-feature-settings: "tnum"; min-height: 16px; }

/* Welcome */
.welcome { max-width: 420px; margin: 20px auto; padding: 8px 20px 40px; text-align: center; animation: fadeIn .4s ease; }
.welcome-hero { margin: 20px auto 24px; filter: drop-shadow(0 8px 24px rgba(0,128,184,0.25)); animation: welcomeFloat 3s ease-in-out infinite; }
.welcome h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; margin-bottom: 10px; background: linear-gradient(180deg, #0A1F2E 0%, #1E3A52 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.welcome-sub { font-size: 14px; color: #4A5A6E; line-height: 1.55; margin-bottom: 20px; max-width: 340px; margin-left: auto; margin-right: auto; }
.welcome-link { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 18px; background: rgba(0,128,184,0.08); border: 1px solid rgba(0,128,184,0.18); border-radius: 12px; text-decoration: none; color: #0080B8; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
.welcome-input-wrap { text-align: left; margin-bottom: 14px; }
.welcome-input-wrap label { display: block; font-size: 12px; color: #4A5A6E; font-weight: 600; margin-bottom: 6px; padding: 0 4px; }
.welcome-input-wrap input { width: 100%; padding: 16px 20px; background: white; border: 2px solid rgba(0,50,90,0.14); border-radius: 14px; color: #0A1F2E; font-size: 26px; font-weight: 600; font-family: inherit; font-feature-settings: "tnum"; letter-spacing: -0.5px; text-align: center; -webkit-appearance: none; box-shadow: 0 1px 2px rgba(0,32,64,0.05); }
.welcome-input-wrap input:focus { outline: none; border-color: #0080B8; }
.welcome-btn { width: 100%; padding: 16px; background: #0080B8; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 4px 12px rgba(0,128,184,0.3); }
.welcome-btn:active { background: #00A3E0; transform: scale(0.98); }
.welcome-footnote { font-size: 11px; color: #8294A8; margin-top: 20px; line-height: 1.6; }

/* Scene */
.scene { position: relative; margin: 0 0 12px; border-radius: 22px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,32,64,0.06), 0 8px 24px rgba(0,32,64,0.04); border: 1px solid rgba(0,50,90,0.08); background: white; }
.scene svg.bg { width: 100%; height: 140px; display: block; }
.scene-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 14px 16px; }
.scene-top { display: flex; justify-content: space-between; align-items: flex-start; }
.scene-loc { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 0.6px; text-transform: uppercase; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.scene-name { font-size: 20px; font-weight: 700; color: white; letter-spacing: -0.3px; margin-top: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.25); }
.scene-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.9); }
.scene-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.scene-pill-text { font-size: 11px; font-weight: 700; }
.scene-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
.scene-temp { font-size: 22px; font-weight: 300; color: white; letter-spacing: -1px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

/* Hero */
.hero { background: white; border: 1px solid rgba(0,50,90,0.08); border-radius: 22px; padding: 20px 20px 18px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,32,64,0.06); position: relative; }
.hero-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hero-label { font-size: 11px; font-weight: 700; color: #8294A8; letter-spacing: 0.6px; text-transform: uppercase; }
.hero-actions { display: flex; gap: 6px; align-items: center; }
.hero-source { font-size: 10px; color: #8294A8; font-weight: 500; }
.edit-btn { width: 28px; height: 28px; background: #ECF3FA; border: 1px solid rgba(0,50,90,0.08); border-radius: 999px; color: #4A5A6E; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.edit-btn:active { background: rgba(0,128,184,0.08); }
.hero-lv { display: flex; align-items: flex-start; gap: 5px; }
.hero-num { font-size: 72px; font-weight: 200; letter-spacing: -3px; line-height: 0.88; font-feature-settings: "tnum"; }
.hero-unit { font-size: 20px; font-weight: 300; color: #8294A8; margin-top: 8px; }

/* New slim hero elements */
.hero-status { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 15px; font-weight: 500; color: #4A5A6E; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 3px rgba(255,255,255,0.8); flex-shrink: 0; }
.status-text b { font-weight: 700; }
.hero-facts { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 13px; font-weight: 500; color: #4A5A6E; font-feature-settings: "tnum"; }
.fact-sep { color: #B8C5D2; }
.fact-v { font-weight: 600; }

/* Legacy hero-trend/meta/desc — kept for backward compatibility but unused on overview */
.hero-trend { font-size: 18px; font-weight: 600; margin-top: 8px; }
.hero-meta { display: flex; gap: 12px; font-size: 13px; color: #4A5A6E; margin-top: 6px; font-feature-settings: "tnum"; }
.hero-meta .sep { color: #B8C5D2; }
.hero-meta .dv { font-weight: 600; }
.hero-desc { font-size: 13px; color: #4A5A6E; margin-top: 10px; line-height: 1.5; }

/* Level bar */
.levelbar { margin-top: 14px; height: 22px; border-radius: 8px; background: linear-gradient(90deg, rgba(107,119,133,0.08), rgba(0,128,184,0.08), rgba(194,106,26,0.08), rgba(201,48,48,0.08)); position: relative; border: 1px solid rgba(0,50,90,0.08); }
.levelbar-mark { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(0,32,64,0.12); }
.levelbar-mark-label { position: absolute; top: -12px; font-size: 9px; font-weight: 600; color: #8294A8; transform: translateX(-50%); white-space: nowrap; left: 0; }
.levelbar-pin { position: absolute; top: -3px; bottom: -3px; width: 4px; border-radius: 3px; transform: translateX(-2px); box-shadow: 0 0 0 2px white, 0 2px 6px rgba(0,0,0,0.2); transition: left .6s cubic-bezier(.2,.8,.25,1); }

/* Stats (legacy - no longer used on overview but kept in case other tabs use it) */
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat { background: white; border: 1px solid rgba(0,50,90,0.08); border-radius: 14px; padding: 12px 12px 10px; box-shadow: 0 1px 2px rgba(0,32,64,0.05); }
.stat-l { font-size: 10px; font-weight: 700; color: #8294A8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.stat-v { font-size: 20px; font-weight: 650; letter-spacing: -0.4px; font-feature-settings: "tnum"; display: flex; align-items: baseline; gap: 3px; }
.stat-u { font-size: 11px; color: #8294A8; font-weight: 500; }

/* Activity card — "Heute relevant" with 5-step scale (color-only, no emoji icons) */
.activity-card { padding: 14px 14px 16px; }
.activity-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.activity-item {
  padding: 13px 11px 12px;
  background: white;
  border-radius: 14px;
  border: 1px solid rgba(0,50,90,0.08);
  border-top: 3px solid;  /* color set inline per rating */
  text-align: left;
}
.activity-label { font-size: 10px; font-weight: 700; color: #8294A8; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
.activity-status { font-size: 16px; font-weight: 700; line-height: 1.15; margin-bottom: 4px; letter-spacing: -0.2px; }
.activity-sub { font-size: 11px; color: #4A5A6E; line-height: 1.4; }

/* Rating scale explanation in Model tab */
.rating-scale { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px; background: rgba(0,128,184,0.03); border-radius: 10px; border: 1px solid rgba(0,50,90,0.06); margin-bottom: 6px; }
.rating-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.rating-row b { font-weight: 700; min-width: 110px; }
.rating-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px white; }
.rating-desc { color: #4A5A6E; font-size: 12.5px; }
.rating-list { font-size: 12.5px; color: #4A5A6E; line-height: 1.7; margin: 0 0 4px 16px; padding: 0; }
.rating-list li { margin-bottom: 2px; list-style-type: "· "; padding-left: 4px; }
.rating-list b { font-weight: 700; }

/* Driver chips (modular "Warum"-Card) */
.driver-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 6px; padding: 0 2px; }
.driver-chip { font-size: 12px; padding: 6px 11px; border-radius: 999px; border: 1px solid; background: rgba(255,255,255,0.6); font-weight: 500; line-height: 1.3; }
.driver-chip b { font-weight: 700; }

/* Confidence badge */
.confidence-badge { font-size: 10.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; border: 1px solid; background: white; text-transform: uppercase; letter-spacing: 0.4px; }

/* Link card (pointer to other tabs) */
.link-card { cursor: pointer; padding: 12px 14px; transition: background .15s; }
.link-card:active { background: rgba(0,128,184,0.04); }
.link-card-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.link-card-t { font-size: 13.5px; font-weight: 600; color: #1A2432; }
.link-card-s { font-size: 11.5px; color: #8294A8; margin-top: 2px; }
.link-card-arrow { font-size: 18px; color: #8294A8; font-weight: 300; }

/* Inflow arrow direction (on each gauge node) */
.inflow-arrow-dir { display: inline-block; font-size: 13px; font-weight: 700; margin-left: 2px; }

/* Staggered card appearance on render */
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: cardIn .35s cubic-bezier(.2,.8,.25,1) both; }
.card:nth-of-type(1) { animation-delay: .02s; }
.card:nth-of-type(2) { animation-delay: .06s; }
.card:nth-of-type(3) { animation-delay: .10s; }
.card:nth-of-type(4) { animation-delay: .14s; }
.card:nth-of-type(5) { animation-delay: .18s; }
.card:nth-of-type(n+6) { animation-delay: .22s; }

/* Cards */
.card { background: white; border: 1px solid rgba(0,50,90,0.08); border-radius: 20px; padding: 16px 14px 12px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,32,64,0.05); }
.chartcard { padding: 12px 8px 10px; }
.cardh { font-size: 11px; font-weight: 700; color: #8294A8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding: 0 4px; display: flex; justify-content: space-between; align-items: center; }
.cardh-r { font-size: 10px; font-weight: 500; text-transform: none; letter-spacing: 0; }

/* Forecast rows */
.row { display: grid; grid-template-columns: 48px 28px 1fr 52px 56px 44px; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid rgba(0,50,90,0.08); }
.row:last-child { border-bottom: none; }
.row.today { background: linear-gradient(90deg, rgba(0,128,184,0.08) 0%, transparent 80%); margin: 0 -4px; padding: 9px 8px; border-radius: 10px; border-bottom: none; }
.row.today .day { font-weight: 700; }
.day { font-size: 14px; font-weight: 600; }
.day small { display: block; font-size: 9px; font-weight: 500; color: #8294A8; margin-top: 1px; font-feature-settings: "tnum"; }
.ic { text-align: center; font-size: 20px; }
.pbar { height: 5px; border-radius: 999px; background: rgba(0,32,64,0.06); overflow: hidden; }
.fill { height: 100%; border-radius: 999px; transition: width .4s; }
.pval { font-size: 11px; color: #4A5A6E; font-feature-settings: "tnum"; text-align: right; font-weight: 500; }
.temps { font-size: 12px; font-feature-settings: "tnum"; text-align: right; font-weight: 500; white-space: nowrap; }
.tmin { color: #8294A8; font-weight: 400; }
.delta { font-size: 12px; font-weight: 700; font-feature-settings: "tnum"; text-align: right; }

/* Tabbar */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid rgba(0,50,90,0.08);
  padding: 8px 8px calc(env(safe-area-inset-bottom) + 8px);
  display: none; gap: 4px; z-index: 50;
}
.tabbar.visible { display: flex; }
.tab { flex: 1; border: none; background: transparent; padding: 10px 4px; color: #8294A8; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 10px; }
.tab.active { color: #0080B8; background: rgba(0,128,184,0.08); }

/* Explain */
.explain { padding: 16px 14px 12px; }
.explain-sum { font-size: 15px; line-height: 1.55; margin-bottom: 12px; padding: 0 2px; }
.explain-drivers { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding: 12px 14px; background: linear-gradient(135deg, rgba(0,128,184,0.04), rgba(124,184,223,0.03)); border-radius: 12px; border: 1px solid rgba(0,50,90,0.08); }
.driver { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; line-height: 1.5; }
.driver b { font-weight: 700; }
.explain-cf { font-size: 12.5px; color: #4A5A6E; line-height: 1.55; padding: 8px 4px 0; font-style: italic; }
.dev { margin-top: 12px; padding: 12px 14px; background: rgba(194,106,26,0.08); border: 1px solid rgba(194,106,26,0.2); border-radius: 12px; }
.dev-head { color: #C26A1A; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.dev-params { font-size: 12px; color: #4A5A6E; font-feature-settings: "tnum"; margin-bottom: 5px; }
.dev-diff { font-size: 13px; line-height: 1.4; }
.dev-reset { display: inline-block; margin-top: 6px; font-size: 12px; color: #C26A1A; text-decoration: underline; cursor: pointer; font-weight: 600; }

/* Inflow chain card - Ammer upstream gauges */
.inflow-card { padding: 14px 12px 14px; }
.inflow-chain { display: flex; align-items: stretch; justify-content: space-between; gap: 4px; padding: 4px 2px 10px; overflow-x: auto; }
.inflow-node { display: flex; flex-direction: column; align-items: center; min-width: 62px; flex: 1 1 auto; padding: 4px 2px; }
.inflow-lake { background: rgba(0,119,160,0.06); border-radius: 10px; padding: 4px 6px; }
.inflow-lag { font-size: 9px; font-weight: 700; color: #8294A8; letter-spacing: 0.5px; margin-bottom: 4px; }
.inflow-dot { width: 10px; height: 10px; border-radius: 50%; margin-bottom: 6px; box-shadow: 0 0 0 3px rgba(255,255,255,0.8), 0 1px 2px rgba(0,32,64,0.15); }
.inflow-name { font-size: 11px; font-weight: 700; color: #4A5A6E; margin-bottom: 2px; text-align: center; }
.inflow-q { font-size: 12px; font-weight: 700; font-feature-settings: "tnum"; margin-bottom: 2px; white-space: nowrap; }
.inflow-role { font-size: 9px; color: #8294A8; text-align: center; font-style: italic; }
.inflow-arrow { display: flex; align-items: center; color: #C0C8D4; font-size: 14px; font-weight: 300; padding: 0 0 16px; }
.inflow-trend { font-size: 12px; font-weight: 600; text-align: center; padding: 8px 4px 0; border-top: 1px solid rgba(0,50,90,0.06); }

/* Banner */
.banner { background: rgba(194,106,26,0.08); border: 1px solid rgba(194,106,26,0.2); border-radius: 12px; padding: 10px 14px; font-size: 12px; color: #7A4100; margin: 0 0 12px; display: flex; align-items: center; gap: 10px; line-height: 1.4; }
.banner a { color: #C26A1A; font-weight: 700; text-decoration: none; cursor: pointer; }

/* Days tab */
.day-detail { background: white; border: 1px solid rgba(0,50,90,0.08); border-radius: 18px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,32,64,0.05); }
.day-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.day-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.day-name { flex: 1; }
.day-name .n { font-size: 16px; font-weight: 700; }
.day-name .d { font-size: 11px; color: #8294A8; font-feature-settings: "tnum"; }
.day-delta { font-size: 18px; font-weight: 700; font-feature-settings: "tnum"; }
.day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
.day-m { padding: 8px 10px; background: rgba(0,50,90,0.03); border-radius: 8px; }
.day-m-l { font-size: 9px; color: #8294A8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.day-m-v { font-size: 14px; font-weight: 600; margin-top: 2px; font-feature-settings: "tnum"; }
.day-c-row { display: grid; grid-template-columns: 80px 1fr 68px; gap: 6px; align-items: center; padding: 3px 0; font-size: 11px; }
.day-c-bar { height: 3px; border-radius: 999px; background: rgba(0,32,64,0.05); overflow: hidden; position: relative; }
.day-c-mid { position: absolute; left: 50%; top: -1px; bottom: -1px; width: 1px; background: rgba(0,50,90,0.14); }
.day-c-pos { position: absolute; left: 50%; top: 0; bottom: 0; border-radius: 0 999px 999px 0; }
.day-c-neg { position: absolute; right: 50%; top: 0; bottom: 0; border-radius: 999px 0 0 999px; }
.day-c-v { text-align: right; font-weight: 600; font-feature-settings: "tnum"; }

/* Model */
.model-eq { background: rgba(0,128,184,0.06); border: 1px solid rgba(0,128,184,0.18); border-radius: 12px; padding: 12px 14px; margin: 12px 0; font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; line-height: 1.7; }
.sg { margin-bottom: 14px; }
.sh { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.sl { font-size: 13px; font-weight: 600; }
.sl small { display: block; font-size: 10px; color: #8294A8; font-weight: 500; margin-top: 1px; }
.sv { font-size: 15px; font-weight: 700; color: #0080B8; font-feature-settings: "tnum"; }
input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 26px; background: transparent; cursor: pointer; }
input[type=range]::-webkit-slider-runnable-track { height: 5px; border-radius: 999px; background: rgba(0,32,64,0.08); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: white; border: 2px solid #0080B8; margin-top: -7px; box-shadow: 0 2px 6px rgba(0,50,90,0.2); }
.sr { display: flex; justify-content: space-between; font-size: 10px; color: #8294A8; font-feature-settings: "tnum"; padding: 0 2px; }

<body>

<button class="fab" id="refreshBtn" aria-label="Daten aktualisieren"><span aria-hidden="true">↻</span></button>
<div id="app" class="container"></div>
<nav class="tabbar" id="tabbar" role="tablist" aria-label="Ansichten">
  <button class="tab active" data-t="overview" role="tab" aria-label="Übersicht">Übersicht</button>
  <button class="tab" data-t="days" role="tab" aria-label="7-Tage-Detail">7 Tage</button>
  <button class="tab" data-t="model" role="tab" aria-label="Modell">Modell</button>
</nav>

<script>
// ============================================================
// CONSTANTS
// ============================================================
var MEAN = 533.01, M1 = 533.50, M3 = 534.00;
var LAKE = 46.6e6, CATCH_AREA = 993e6, SILL = 532.50;
var LAND_AREA = CATCH_AREA - LAKE;  // 946.4e6 m² land only (fixed double-count)
// REGULATED OUTFLOW: Stegener Wehr is operator-controlled, NOT a free weir
// The HND-gauge "Stegen/Amper" (16602303) measures actual release directly.
// Typical behavior: outflow held close to inflow during normal/dry, 
// elevated during floods. Reacts slowly to level changes (~20 m³/s per meter).
var AMPER_OUT_URL = "https://www.hnd.bayern.de/pegel/isar/stegen-16602303/tabelle?methode=abfluss";
var OUTFLOW_SENSITIVITY = 20.0;   // m³/s per meter of head change
var Q_MIN_ECO = 8.0;              // ecological minimum release (m³/s)
var Q_MAX_FLOOD = 80.0;           // flood protection cap (m³/s)
// Fallback rating curve (only when measurement unavailable)
var K_WEIR_FALLBACK = 32.0;
var WEIR_EXPONENT_FALLBACK = 0.62;

// ============================================================
// MODEL V3 - Calibrated Hydrological Constants
// - Snow: degree-day melt (Bergström/HBV style)
// - Soil: bucket model with field capacity + saturation excess
// - Runoff: 5-day unit hydrograph for channel routing
// - Groundwater: linear reservoir with recession
// - Lake: rating-curve outflow, FAO-56 ET0 for evap
// ============================================================
var SOIL_MAX = 80;           // mm - soil max capacity
var FC_THRESHOLD = 45;       // mm - field capacity (perc above)
var PERC_COEF = 0.18;        // fraction of (soil-FC) percolating/day
var PERC_MAX = 3.0;          // mm/day max percolation
var UH = [0.15, 0.35, 0.30, 0.15, 0.05];  // 5-day UH (land-to-lake routing)
var MELT_FACTOR = 2.5;       // mm/°C/day degree-day snowmelt
var BASEFLOW_MIN = 0.55;     // mm/day dry-period baseflow floor (raised from 0.40 after field-test feedback)
var GW_RECESSION = 0.06;     // per day groundwater recession
var INIT_SOIL_FRAC = 0.60;   // initial soil saturation if no spin-up
var INIT_GW = 30;            // mm initial groundwater (raised from 22 to balance spin-up with only 10 days)
var LAKE_EVAP_FACTOR = 0.75; // fraction of ET0 for open lake evap
var AMMER_FRACTION = 0.79;   // Ammer share of total catchment inflow (MQ)

// URLs
var HND_URL = "https://www.hnd.bayern.de/pegel/isar/stegen-16602008";
var SAILING_URL = "https://www.ammersee-sailing.de/HSCWebcam/wasser.php";
var AMMER_URL = "https://www.hnd.bayern.de/pegel/isar/weilheim-16613004/abfluss";
// Upstream Ammer gauges — give advance warning of incoming flood peaks
// Oberammergau → Peißenberg: ~6-12h lag | Peißenberg → Weilheim: ~6-12h | Weilheim → Ammersee: ~24-34h
var AMMER_PEISS_URL = "https://www.hnd.bayern.de/pegel/isar/peissenberg-16612001/abfluss";
var AMMER_OBERAMM_URL = "https://www.hnd.bayern.de/pegel/isar/oberammergau-16610709/abfluss";
// Weather: ICON-D2 DWD model with past_days=10 for spin-up
var WX_URL = "https://api.open-meteo.com/v1/forecast" +
  "?latitude=47.95&longitude=11.12" +
  "&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean," +
  "precipitation_sum,rain_sum,snowfall_sum,et0_fao_evapotranspiration" +
  "&past_days=10&forecast_days=7&timezone=Europe/Berlin";

// Ensemble: DWD ICON-EPS (20+ perturbed members) for probabilistic forecasting
// Each member = slightly different precipitation/temperature trajectory
// We run our hydrological model for EACH member → per-day P10/P50/P90 percentiles
var WX_ENS_URL = "https://api.open-meteo.com/v1/ensemble" +
  "?latitude=47.95&longitude=11.12" +
  "&hourly=temperature_2m,precipitation,rain" +
  "&models=icon_seamless" +
  "&forecast_days=7&timezone=Europe/Berlin";

var DEFAULTS = {
  precipMult: 1.0,
  rcPeak: 0.70,
  rcMin: 0.08,
  evapMult: 1.0,
  useAmmer: true   // use live Ammer discharge for day-1 blend
};

// Known Meldestufen for Pegel Stegen - values EXACTLY matching these are SUSPICIOUS
// (parser likely picked up the wrong line)
var MELDESTUFEN = [533.50, 534.00, 534.50];
function isSuspiciousLevel(v) {
  if (v == null || !isFinite(v)) return false;
  for (var k = 0; k < MELDESTUFEN.length; k++) {
    if (Math.abs(v - MELDESTUFEN[k]) < 0.005) return true;
  }
  return false;
}


var LS_LEVEL = "amm_v5_level";
var LS_TIME = "amm_v5_time";
var LS_AUTO = "amm_v5_auto";
var LS_TAB = "amm_v5_tab";
var LS_PARAMS = "amm_v5_params";

// ============================================================
// STATE
// ============================================================
var state = {
  level: null,
  timestamp: null,
  isAuto: false,
  weather: null,          // raw Open-Meteo response
  weatherDays: null,      // normalized [day objects]
  forecastStart: 10,      // index of first forecast day (after spin-up)
  ammerQ: null,           // measured Ammer inflow at Weilheim m³/s (optional)
  ammerTimestamp: null,
  ammerPeissQ: null,      // Ammer @ Peißenberg m³/s - 6-12h early warning vs Weilheim
  ammerPeissTimestamp: null,
  ammerOberammQ: null,    // Ammer @ Oberammergau m³/s - 12-24h early warning vs Weilheim
  ammerOberammTimestamp: null,
  amperOut: null,         // measured Amper OUTFLOW at Stegen m³/s (optional)
  amperOutTimestamp: null,
  ensembleMembers: null,  // per-member forecast days from ICON-EPS for probabilistic bands
  ensembleTimestamp: null,
  tab: "overview",
  params: Object.assign({}, DEFAULTS),
  autoFailed: false,
  currentRequestId: 0     // race-condition guard
};

// ============================================================
// STORAGE
// ============================================================
function getStored() {
  try {
    var lv = parseFloat(localStorage.getItem(LS_LEVEL));
    var ts = parseInt(localStorage.getItem(LS_TIME));
    var auto = localStorage.getItem(LS_AUTO) === "1";
    if (lv >= 530 && lv <= 540 && ts > 0) {
      // Self-heal: if cached value is EXACTLY a Meldestufe (533.50, 534.00...), it's a bad parse
      if (typeof isSuspiciousLevel === "function" && isSuspiciousLevel(lv)) {
        console.warn("Cached pegel " + lv + " = Meldestufe - discarding bad cache");
        try { localStorage.removeItem(LS_LEVEL); localStorage.removeItem(LS_TIME); localStorage.removeItem(LS_AUTO); } catch (e2) {}
        return null;
      }
      return { level: lv, timestamp: ts, auto: auto };
    }
  } catch (e) {}
  return null;
}
function setStored(level, isAuto) {
  try {
    localStorage.setItem(LS_LEVEL, String(level));
    localStorage.setItem(LS_TIME, String(Date.now()));
    localStorage.setItem(LS_AUTO, isAuto ? "1" : "0");
  } catch (e) {}
}
function getStoredTab() {
  try { return localStorage.getItem(LS_TAB) || "overview"; } catch (e) { return "overview"; }
}
function setStoredTab(t) { try { localStorage.setItem(LS_TAB, t); } catch (e) {} }
function getStoredParams() {
  try {
    var p = JSON.parse(localStorage.getItem(LS_PARAMS));
    if (p && typeof p === "object") {
      // Migrate old schema: drop "rc","baseflow","lag" (no longer used), 
      // keep precipMult/evapMult. Use DEFAULTS for new keys (rcPeak, rcMin, soilInit).
      var migrated = Object.assign({}, DEFAULTS);
      if (typeof p.precipMult === "number") migrated.precipMult = p.precipMult;
      if (typeof p.evapMult === "number") migrated.evapMult = p.evapMult;
      if (typeof p.soilInit === "number") migrated.soilInit = p.soilInit;
      if (typeof p.rcPeak === "number") migrated.rcPeak = p.rcPeak;
      if (typeof p.rcMin === "number") migrated.rcMin = p.rcMin;
      return migrated;
    }
  } catch (e) {}
  return Object.assign({}, DEFAULTS);
}
function setStoredParams(p) { try { localStorage.setItem(LS_PARAMS, JSON.stringify(p)); } catch (e) {} }

// ============================================================
// DATA FETCHING
// ============================================================
function setLoadingStep(text) {
  var el = document.getElementById("loadStep");
  if (el) el.textContent = text;
}

function extractLevel(text) {
  if (!text) return null;
  
  // Pattern 1 (HIGHEST confidence): "Letzter Messwert ... : NUMBER m"
  // Requires colon before the value and "m" after to avoid Meldestufe lines
  // MS lines look like: "**Meldestufe 1** 533,50 m NHN" (NO colon)
  // Messwert lines: "...Uhr: **533,22** m NHN" (HAS colon before value)
  var p1 = text.match(/Letzter\s+Messwert[\s\S]{0,200}?Uhr\s*:\s*\**\s*(5[2-4]\d)[,.](\d{2})/i);
  if (p1) {
    var v = parseFloat(p1[1] + "." + p1[2]);
    if (v >= 532.0 && v <= 535.0) return v;
  }
  
  // Pattern 2: Sailing mirror "Aktueller Wasserstand (Stegen): 532.93 m NHN"
  var p2 = text.match(/Aktueller\s+Wasserstand[^\n]{0,60}?:\s*(5[2-4]\d)[,.](\d{2})/i);
  if (p2) {
    var v = parseFloat(p2[1] + "." + p2[2]);
    if (v >= 532.0 && v <= 535.0) return v;
  }
  
  // Pattern 3: HND table row - "| 05.03.2026 20:45 | 533,22 |"
  // Look for timestamp | value pattern, first row = newest
  var p3 = text.match(/\|\s*\d{2}\.\d{2}\.\d{4}[^\|]*\|\s*(5[2-4]\d)[,.](\d{2})\s*\|/);
  if (p3) {
    var v = parseFloat(p3[1] + "." + p3[2]);
    if (v >= 532.0 && v <= 535.0) return v;
  }
  
  // Fallback: scan all candidates, STRICTLY reject Meldestufe context + suspicious exact values
  var candidates = [];
  var re = /5[2-4]\d[,.]\d{2}/g;
  var match;
  while ((match = re.exec(text)) !== null) {
    var ctx = text.substring(Math.max(0, match.index - 60), match.index).toLowerCase();
    var isMS = /meldestufe|hochwassermarke|hw100|hw\s*\d|gefahrenfläche/.test(ctx);
    var val = parseFloat(match[0].replace(",", "."));
    if (val >= 532.0 && val <= 535.0 && !isMS && !isSuspiciousLevel(val)) {
      candidates.push(val);
    }
  }
  if (candidates.length > 0) return candidates[0];
  return null;
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function(_, rej) { setTimeout(function() { rej(new Error("timeout")); }, ms); })
  ]);
}

// Strategy 1: Sailing (CORS-enabled? let's try direct first)
function trySailing() {
  return withTimeout(
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(SAILING_URL), { cache: "no-store" })
      .then(function(r) { if (!r.ok) throw new Error("sailing http " + r.status); return r.text(); })
      .then(function(txt) {
        var lv = extractLevel(txt);
        if (lv === null) throw new Error("sailing no value");
        return lv;
      }),
    10000
  );
}

// Strategy 2: Jina Reader (JS-renders HND main page)
function tryJina() {
  return withTimeout(
    fetch("https://r.jina.ai/" + HND_URL, { cache: "no-store" })
      .then(function(r) { if (!r.ok) throw new Error("jina http " + r.status); return r.text(); })
      .then(function(txt) {
        var lv = extractLevel(txt);
        if (lv === null) throw new Error("jina no value");
        return lv;
      }),
    20000
  );
}

// Strategy 3: AllOrigins of HND main page
function tryAllOriginsHND() {
  return withTimeout(
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(HND_URL), { cache: "no-store" })
      .then(function(r) { if (!r.ok) throw new Error("allorigins http " + r.status); return r.text(); })
      .then(function(txt) {
        var lv = extractLevel(txt);
        if (lv === null) throw new Error("allorigins no value");
        return lv;
      }),
    12000
  );
}

function fetchPegelAuto() {
  setLoadingStep("Suche Pegelstand...");
  // Manual Promise.any-like racing (older Safari compat)
  var fns = [trySailing, tryJina, tryAllOriginsHND];
  return new Promise(function(resolve, reject) {
    var errors = [];
    var settled = false;
    var count = 0;
    fns.forEach(function(fn) {
      fn().then(function(v) {
        if (settled) return;
        settled = true;
        resolve(v);
      }).catch(function(e) {
        errors.push(e);
        count++;
        if (count === fns.length && !settled) {
          settled = true;
          reject(new Error("all strategies failed: " + errors.map(function(e){return e.message;}).join("; ")));
        }
      });
    });
  });
}

function fetchWeather(signal) {
  setLoadingStep("Lade Wetter (DWD ICON-D2, 10 Tage Historie)...");
  return withTimeout(
    fetch(WX_URL, { cache: "no-store", signal: signal })
      .then(function(r) { if (!r.ok) throw new Error("Wetter HTTP " + r.status); return r.json(); }),
    20000
  );
}

// Fetch CURRENT Amper outflow at Stegen (downstream of lake = actual outflow)
// This is the REAL current outflow, measured directly. Much more accurate
// than any rating curve because the Stegener Wehr is regulated.
function fetchAmperOutflow(signal) {
  setLoadingStep("Lade Amper-Abfluss (Stegen)...");
  return withTimeout(
    fetch("https://r.jina.ai/" + AMPER_OUT_URL, { cache: "no-store", signal: signal })
      .then(function(r) { if (!r.ok) throw new Error("Amper HTTP " + r.status); return r.text(); })
      .then(function(txt) {
        // Table format: first row is latest.
        // "| 19.04.2026 20:00 | 14 |"  or  "| ... | 13,6 |"
        var m = txt.match(/\|\s*\d{2}\.\d{2}\.\d{4}[^\|]*\|\s*(\d{1,3}(?:[,.]\d{1,2})?)\s*\|/);
        if (m) {
          var v = parseFloat(m[1].replace(",", "."));
          if (v >= 0.1 && v <= 200) return v;
        }
        return null;
      })
      .catch(function() { return null; }),
    15000
  );
}

// Fetch current Ammer discharge at Weilheim (via Jina Reader)
function fetchAmmerDischarge(signal) {
  setLoadingStep("Lade Ammer-Zufluss (Weilheim)...");
  return fetchDischargeGauge(AMMER_URL, signal, 800);
}

// Fetch Ammer discharge UPSTREAM (Peißenberg) — 6-12h before Weilheim
function fetchAmmerPeissenberg(signal) {
  setLoadingStep("Lade Ammer-Zufluss (Peißenberg)...");
  return fetchDischargeGauge(AMMER_PEISS_URL, signal, 800);
}

// Fetch Ammer discharge FAR UPSTREAM (Oberammergau) — 12-24h before Weilheim
function fetchAmmerOberammergau(signal) {
  setLoadingStep("Lade Ammer-Zufluss (Oberammergau)...");
  return fetchDischargeGauge(AMMER_OBERAMM_URL, signal, 400);
}

// Reusable helper: parses standard HND "Letzter Messwert" m³/s format
function fetchDischargeGauge(url, signal, maxReasonable) {
  return withTimeout(
    fetch("https://r.jina.ai/" + url, { cache: "no-store", signal: signal })
      .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(function(txt) {
        var m = txt.match(/Letzter\s+Messwert[\s\S]{0,150}?(\d{1,3})[,.](\d{1,2})\s*m/i);
        if (m) {
          var v = parseFloat(m[1] + "." + m[2]);
          if (v >= 0.01 && v <= (maxReasonable || 800)) return v;
        }
        return null;
      })
      .catch(function() { return null; }),
    15000
  );
}

// Fetch ensemble weather forecast (DWD ICON-EPS, 20-40 perturbed members)
// Returns probabilistic forecast for proper uncertainty quantification
function fetchEnsemble(signal) {
  setLoadingStep("Lade Ensemble-Wettervorhersage (DWD ICON-EPS)...");
  return withTimeout(
    fetch(WX_ENS_URL, { cache: "no-store", signal: signal })
      .then(function(r) { if (!r.ok) throw new Error("Ensemble HTTP " + r.status); return r.json(); })
      .catch(function(e) {
        console.warn("Ensemble fetch failed, will use 3-scenario fallback:", e.message);
        return null;
      }),
    25000
  ).catch(function() { return null; });
}

// Percentile helper for sorted-ascending array
function percentile(sortedArr, p) {
  if (!sortedArr || !sortedArr.length) return 0;
  var idx = (p / 100) * (sortedArr.length - 1);
  var lo = Math.floor(idx);
  var hi = Math.ceil(idx);
  if (lo === hi) return sortedArr[lo];
  return sortedArr[lo] + (idx - lo) * (sortedArr[hi] - sortedArr[lo]);
}

// Normalize ensemble API response → array of per-member day arrays
// Each member matches the format of normalizeWeatherData output
function normalizeEnsembleMembers(ensRaw, deterministicDays, nForecastDays) {
  if (!ensRaw || !ensRaw.hourly) return null;
  var h = ensRaw.hourly;
  if (!h.time || !h.temperature_2m || !h.precipitation) return null;

  // Discover which member numbers exist (0 = control, then 01, 02, ...)
  var memberSet = {};
  memberSet["0"] = true;  // control (no suffix)
  Object.keys(h).forEach(function(k) {
    var m = k.match(/_member(\d+)$/);
    if (m) memberSet[String(parseInt(m[1]))] = true;
  });
  var memberNums = Object.keys(memberSet).map(function(s){return parseInt(s);}).sort(function(a,b){return a-b;});

  var members = [];
  for (var mi = 0; mi < memberNums.length; mi++) {
    var n = memberNums[mi];
    var suf = (n === 0) ? "" : ("_member" + (n < 10 ? "0" + n : String(n)));
    var tKey = "temperature_2m" + suf;
    var pKey = "precipitation" + suf;
    if (!h[tKey] || !h[pKey]) continue;
    // Skip if all values are null
    var hasData = false;
    for (var i = 0; i < h[tKey].length; i++) {
      if (h[tKey][i] != null && isFinite(h[tKey][i])) { hasData = true; break; }
    }
    if (!hasData) continue;
    var days = buildMemberDays(h, suf, nForecastDays, deterministicDays);
    if (days && days.length === nForecastDays) members.push(days);
  }
  return members.length > 0 ? members : null;
}

function buildMemberDays(hourly, suffix, nDays, deterministicDays) {
  var time = hourly.time;
  var temps = hourly["temperature_2m" + suffix];
  var precips = hourly["precipitation" + suffix];
  var rains = hourly["rain" + suffix];

  var days = [];
  for (var d = 0; d < nDays; d++) {
    var s = d * 24;
    var e = s + 24;
    if (e > time.length) break;

    var tList = [], pList = [], rList = [];
    for (var i = s; i < e; i++) {
      var t = temps[i];
      if (t != null && isFinite(t)) tList.push(t);
      var p = precips[i];
      if (p != null && isFinite(p)) pList.push(p);
      if (rains) {
        var r = rains[i];
        if (r != null && isFinite(r)) rList.push(r);
      }
    }
    if (tList.length === 0) return null;

    var tMin = Math.min.apply(null, tList);
    var tMax = Math.max.apply(null, tList);
    var tMean = tList.reduce(function(a,b){return a+b;}, 0) / tList.length;
    var precipSum = pList.reduce(function(a,b){return a+b;}, 0);
    var rainSum = rList.length ? rList.reduce(function(a,b){return a+b;}, 0) : precipSum;
    var snowWE = Math.max(0, precipSum - rainSum);
    if (!rains && tMean < 0) { snowWE = precipSum; rainSum = 0; }

    // Use deterministic ET0 (ensemble API doesn't provide it)
    var detIdx = deterministicDays.length - nDays + d;
    var et0 = (detIdx >= 0 && detIdx < deterministicDays.length && deterministicDays[detIdx])
      ? deterministicDays[detIdx].et0_mm
      : Math.max(0.3, 0.15 * tMean + 0.3);

    days.push({
      date: time[s].slice(0, 10),
      rain_mm: rainSum,
      snow_mm_we: snowWE,
      precip_mm: precipSum,
      tMin: tMin, tMean: tMean, tMax: tMax,
      et0_mm: et0
    });
  }
  return days;
}

// Run hydrological model for each ensemble member → real P10/P50/P90 bands
function runEnsembleBand(historicalDays, ensembleMembers, currentLevel, p, ammerQ, amperOut, ammerPeissQ, ammerOberammQ) {
  if (!ensembleMembers || ensembleMembers.length === 0) return null;
  p = Object.assign({}, DEFAULTS, p || {});

  var trajectories = ensembleMembers.map(function(fcDays) {
    var fullDays = historicalDays.concat(fcDays);
    return runForecast(fullDays, fcDays.length, currentLevel, p, ammerQ, amperOut, ammerPeissQ, ammerOberammQ);
  });

  var nDays = trajectories[0].length;
  var bandMin = [];  // P10
  var bandMax = [];  // P90
  var median = [];   // P50

  for (var d = 0; d < nDays; d++) {
    var levels = trajectories.map(function(t) { return t[d].level; }).sort(function(a,b){return a-b;});
    bandMin.push(percentile(levels, 10));
    median.push(percentile(levels, 50));
    bandMax.push(percentile(levels, 90));
  }

  // Build "base" trajectory using median levels but other fields from control
  var control = trajectories[0];
  var base = control.map(function(day, i) {
    return Object.assign({}, day, { level: median[i] });
  });

  return {
    base: base,
    bandMin: bandMin,
    bandMax: bandMax,
    median: median,
    nMembers: trajectories.length,
    source: "ensemble"
  };
}

// Normalize Open-Meteo response to our model's day format
function normalizeWeatherData(wx) {
  var d = wx.daily;
  var n = d.time.length;
  var out = [];
  for (var i = 0; i < n; i++) {
    var rain = d.rain_sum ? (d.rain_sum[i] || 0) : (d.precipitation_sum[i] || 0);
    var snowfall_cm = d.snowfall_sum ? (d.snowfall_sum[i] || 0) : 0;
    // Open-Meteo snowfall_sum is in cm (physical). Water equivalent ~ cm × 1 (10:1 conversion).
    // To mm water equivalent: snowfall_cm × 10 / 10 = snowfall_cm (approximate)
    // More reliable: precipitation_sum - rain_sum = snow water equivalent in mm
    var precip = d.precipitation_sum[i] || 0;
    var snowWE = Math.max(0, precip - rain);
    var et0 = d.et0_fao_evapotranspiration ? (d.et0_fao_evapotranspiration[i] || 0) : 
              Math.max(0.2, 0.2 + 0.12 * (d.temperature_2m_mean[i] || 0));  // fallback
    out.push({
      date: d.time[i],
      rain_mm: rain,
      snow_mm_we: snowWE,
      precip_mm: precip,
      tMin: d.temperature_2m_min[i] || 0,
      tMean: d.temperature_2m_mean[i] || 0,
      tMax: d.temperature_2m_max[i] || 0,
      et0_mm: et0
    });
  }
  return out;
}

// ============================================================
// MODEL
// ============================================================
function stepOneDay(state, d, p) {
  // d = { rain_mm, snow_mm_we, tMean, tMax, et0_mm }
  var snowpack = state.snowpack;
  var soil = state.soil;
  var groundwater = state.groundwater;
  
  // Apply precipitation multiplier (user's uncertainty slider) at the source
  // This scales both liquid rain and snow water equivalent — the physically
  // consistent thing to do, since meteorologically they come from the same
  // precipitation forecast with only the phase differing by temperature.
  var rainMm = d.rain_mm * p.precipMult;
  var snowMmWe = d.snow_mm_we * p.precipMult;
  
  // Snow: accumulate water equivalent
  snowpack += snowMmWe;
  // Degree-day melt using tMax (positive only)
  var melt = d.tMax > 0 && snowpack > 0 ? Math.min(snowpack, MELT_FACTOR * Math.max(0, d.tMax)) : 0;
  snowpack -= melt;
  
  // Water available on land for soil infiltration (rain + snowmelt)
  var landWaterInput = rainMm + melt;
  
  // Soil evapotranspiration (FAO-56 ET0 scaled by moisture availability)
  var etRef = d.et0_mm * p.evapMult;
  var soilEvap = Math.min(etRef * (0.35 + 0.65 * (soil / SOIL_MAX)), soil);
  soil = Math.max(0, soil - soilEvap);
  
  // Dynamic runoff coefficient based on soil saturation
  var sat = soil / SOIL_MAX;
  var rcEff = p.rcMin + sat * (p.rcPeak - p.rcMin);
  var quickRunoff = landWaterInput * rcEff;
  
  // Saturation-excess overflow
  var afterInfilt = soil + landWaterInput - quickRunoff;
  if (afterInfilt > SOIL_MAX) {
    quickRunoff += (afterInfilt - SOIL_MAX);
    soil = SOIL_MAX;
  } else {
    soil = Math.max(0, afterInfilt);
  }
  quickRunoff = Math.max(0, Math.min(quickRunoff, landWaterInput));
  
  // Percolation to groundwater (only above field capacity)
  if (soil > FC_THRESHOLD) {
    var perc = Math.min(PERC_MAX, (soil - FC_THRESHOLD) * PERC_COEF);
    soil -= perc;
    groundwater += perc;
  }
  
  // Groundwater linear recession → baseflow
  var gwRelease = groundwater * GW_RECESSION;
  groundwater -= gwRelease;
  var baseflow_mm = BASEFLOW_MIN + gwRelease;
  
  return {
    snowpack: snowpack, soil: soil, groundwater: groundwater,
    quickRunoff_mm: quickRunoff,
    baseflow_mm: baseflow_mm,
    rain_mm: rainMm,      // effective rain AFTER precipMult (for reporting)
    melt_mm: melt,
    et0_mm: d.et0_mm
  };
}

// runForecast(days, nForecast, currentLevel, params, ammerQ_m3s, amperOut_m3s, ammerPeissQ, ammerOberammQ)
// days: array of daily data, oldest first. First (days.length - nForecast) are spin-up.
// Each day: { date, rain_mm, snow_mm_we, precip_mm, tMin, tMean, tMax, et0_mm }
// currentLevel: lake level NOW (beginning of first forecast day)
// ammerQ_m3s: measured Ammer discharge at Weilheim (m³/s) - blends into day 1 (~18h lake lag)
// amperOut_m3s: measured Amper outflow at Stegen (m³/s) - regulated outflow baseline
// ammerPeissQ: Ammer @ Peißenberg (m³/s) - blends into day 2 (~30h lake lag)
// ammerOberammQ: Ammer @ Oberammergau (m³/s) - blends into day 3 (~48h lake lag)
function runForecast(days, nForecast, currentLevel, p, ammerQ_m3s, amperOut_m3s, ammerPeissQ, ammerOberammQ) {
  p = Object.assign({}, DEFAULTS, p || {});
  var nHist = Math.max(0, days.length - nForecast);
  
  // Initialize state
  var state = {
    snowpack: 0,
    soil: SOIL_MAX * INIT_SOIL_FRAC,
    groundwater: INIT_GW
  };
  
  // SPIN-UP PASS: warm the catchment state with historical weather
  var histRunoffs = [];
  for (var h = 0; h < nHist; h++) {
    var step = stepOneDay(state, days[h], p);
    state.snowpack = step.snowpack;
    state.soil = step.soil;
    state.groundwater = step.groundwater;
    histRunoffs.push(step.quickRunoff_mm);
  }
  // Prior 4 days of runoff for UH routing into the forecast period
  var runoffQueue = histRunoffs.slice(-4);
  while (runoffQueue.length < 4) runoffQueue.unshift(0);
  
  // FORECAST PASS: compute catchment response for future days
  var forecastData = [];
  for (var f = 0; f < nForecast; f++) {
    var fstep = stepOneDay(state, days[nHist + f], p);
    state.snowpack = fstep.snowpack;
    state.soil = fstep.soil;
    state.groundwater = fstep.groundwater;
    forecastData.push(fstep);
  }
  
  // UH routing: combine queue + forecast runoffs
  var allRunoffs = runoffQueue.concat(forecastData.map(function(r){return r.quickRunoff_mm;}));
  // allRunoffs[0..3] = t-4..t-1 (history), allRunoffs[4+i] = forecast day i
  
  // LAKE DYNAMICS PASS
  var lv = currentLevel;
  var dayNames = ["So","Mo","Di","Mi","Do","Fr","Sa"];
  var dayLongs = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  var out = [];
  
  for (var i = 0; i < nForecast; i++) {
    // UH routing: weighted sum of recent + current runoffs
    var routedMm = 0;
    for (var j = 0; j < UH.length; j++) {
      var idx = 4 + i - j;
      if (idx >= 0 && idx < allRunoffs.length) {
        routedMm += allRunoffs[idx] * UH[j];
      }
    }
    
    // LAND contributions (fixed: use LAND_AREA not CATCH_AREA)
    var catchmentRunoff_m3 = (routedMm / 1000) * LAND_AREA;
    var baseflow_m3 = (forecastData[i].baseflow_mm / 1000) * LAND_AREA;
    
    // DIRECT rain only on lake surface (fixed: melt stays in catchment)
    var directRain_m3 = (forecastData[i].rain_mm / 1000) * LAKE;
    
    // Measured Ammer discharge — nudge modeled land inflow toward observed values
    // Rationale: a single measurement shouldn't drive the model arbitrarily far from
    // its physical state. Nudging with a bounded ratio (0.75-1.35) keeps corrections
    // stable and preserves the model's internal dynamics.
    //
    // Lag times (Ammer catchment, from geography + Zebrafell's empirical rule):
    //   Weilheim   → lake ~18-24h → day 1
    //   Peißenberg → lake ~30-36h → day 2 (scale 2.3× for MQ ratio)
    //   Oberammergau → lake ~48h  → day 3 (scale 4.0× for MQ ratio)
    var ammerBlend_m3 = 0;
    var nudgeRatio = 1.0;  // 1.0 = no nudge
    if (p.useAmmer) {
      var impliedTotal_m3 = null;
      if (ammerQ_m3s != null && i === 1) {
        impliedTotal_m3 = (ammerQ_m3s * 86400) / AMMER_FRACTION;
      } else if (ammerPeissQ != null && i === 2) {
        impliedTotal_m3 = (ammerPeissQ * 2.3 * 86400) / AMMER_FRACTION;
      } else if (ammerOberammQ != null && i === 3) {
        impliedTotal_m3 = (ammerOberammQ * 4.0 * 86400) / AMMER_FRACTION;
      }
      if (impliedTotal_m3 != null) {
        var modeledLand_m3 = catchmentRunoff_m3 + baseflow_m3;
        if (modeledLand_m3 > 1) {
          var rawRatio = impliedTotal_m3 / modeledLand_m3;
          // Clamp to [0.75, 1.35] — avoids single-gauge spikes breaking the model
          nudgeRatio = Math.max(0.75, Math.min(1.35, rawRatio));
          // Apply mostly to quick runoff (event-driven), a gentler share to baseflow
          catchmentRunoff_m3 *= nudgeRatio;
          baseflow_m3 *= (0.9 + 0.1 * nudgeRatio);
        }
      }
    }
    
    // REGULATED outflow: operator-controlled Stegener Wehr
    // Short horizon (day 0-1): measured Stegen/Amper value dominates
    // Long horizon (day 2+): gradually relax toward modeled inflow (Zu- ≈ Abfluss equilibrium)
    // Sensitivity is two-stage: tame in normal range, reactive above MS1 (flood release)
    var outflow_m3s;
    if (amperOut_m3s != null) {
      var dh = lv - currentLevel;
      var sensEff = (lv >= M1) ? 22.0 : 12.0;  // two-stage sensitivity
      var measuredBased_m3s = amperOut_m3s + dh * sensEff;
      
      // Target: in equilibrium the operator matches outflow to total modeled inflow
      var modeledInflow_m3s = (catchmentRunoff_m3 + baseflow_m3 + directRain_m3 + ammerBlend_m3) / 86400;
      
      // Blend weights: measurement dominates near-term, inflow-target takes over day 2+
      // This prevents "sticking" to today's measured value for 7 days.
      var blend;
      if (i === 0) blend = 0.90;
      else if (i === 1) blend = 0.70;
      else if (i === 2) blend = 0.50;
      else if (i === 3) blend = 0.35;
      else blend = 0.25;
      
      outflow_m3s = blend * measuredBased_m3s + (1 - blend) * modeledInflow_m3s;
      outflow_m3s = Math.max(Q_MIN_ECO, Math.min(Q_MAX_FLOOD, outflow_m3s));
    } else {
      // Fallback: flatter rating curve (only if measurement unavailable)
      var head = Math.max(0, lv - SILL);
      outflow_m3s = K_WEIR_FALLBACK * Math.pow(head, WEIR_EXPONENT_FALLBACK);
    }
    var weirOut_m3 = outflow_m3s * 86400;
    
    // Lake evaporation: scaled FAO-56 ET0
    var lakeEvap_m3 = (forecastData[i].et0_mm * LAKE_EVAP_FACTOR / 1000) * LAKE;
    
    var deltaM = (catchmentRunoff_m3 + baseflow_m3 + directRain_m3 + ammerBlend_m3 - weirOut_m3 - lakeEvap_m3) / LAKE;
    lv += deltaM;
    
    var dt = new Date(days[nHist + i].date);
    out.push({
      day: i === 0 ? "Heute" : dayNames[dt.getDay()],
      dayLong: dayLongs[dt.getDay()],
      date: dt.getDate() + "." + (dt.getMonth() + 1) + ".",
      dateFull: dt.getDate() + "." + (dt.getMonth() + 1) + "." + dt.getFullYear(),
      level: lv,
      delta: deltaM * 100,
      precip: days[nHist + i].precip_mm,
      rain: days[nHist + i].rain_mm,
      snowWE: days[nHist + i].snow_mm_we,
      snow: days[nHist + i].snow_mm_we,
      tMean: days[nHist + i].tMean,
      tMax: days[nHist + i].tMax,
      tMin: days[nHist + i].tMin,
      et0: forecastData[i].et0_mm,
      snowpack: forecastData[i].snowpack,
      soil: forecastData[i].soil,
      saturation: forecastData[i].soil / SOIL_MAX,
      isToday: i === 0,
      comp: {
        rainIn: catchmentRunoff_m3 / LAKE * 100,
        baseIn: baseflow_m3 / LAKE * 100,
        directIn: directRain_m3 / LAKE * 100,
        ammerBlend: ammerBlend_m3 / LAKE * 100,
        weirOut: weirOut_m3 / LAKE * 100,
        evapOut: lakeEvap_m3 / LAKE * 100
      }
    });
  }
  return out;
}

function runForecastBand(days, nForecast, currentLevel, p, ammerQ, amperOut, ammerPeissQ, ammerOberammQ) {
  p = Object.assign({}, DEFAULTS, p || {});
  var base = runForecast(days, nForecast, currentLevel, p, ammerQ, amperOut, ammerPeissQ, ammerOberammQ);
  var dryP = Object.assign({}, p, {
    precipMult: p.precipMult * 0.65,
    rcPeak: Math.max(0.30, p.rcPeak - 0.15),
    evapMult: p.evapMult * 1.20
  });
  var wetP = Object.assign({}, p, {
    precipMult: p.precipMult * 1.40,
    rcPeak: Math.min(0.90, p.rcPeak + 0.12),
    evapMult: p.evapMult * 0.85
  });
  var dry = runForecast(days, nForecast, currentLevel, dryP, ammerQ, amperOut, ammerPeissQ, ammerOberammQ);
  var wet = runForecast(days, nForecast, currentLevel, wetP, ammerQ, amperOut, ammerPeissQ, ammerOberammQ);
  // Tagweise min/max — not global dry/wet assignment (lines may cross)
  var bandMin = base.map(function(_, i) {
    return Math.min(dry[i].level, wet[i].level, base[i].level);
  });
  var bandMax = base.map(function(_, i) {
    return Math.max(dry[i].level, wet[i].level, base[i].level);
  });
  return { base: base, dry: dry, wet: wet, bandMin: bandMin, bandMax: bandMax };
}



function fmtNum(v) { return v.toFixed(2).replace(".", ","); }
function pmNum(v, d) { var s = v.toFixed(d).replace(".", ","); return v >= 0 ? "+" + s : s; }
function statusInfo(level) {
  if (level >= M3) return { label: "Hochwasser", color: "#C93030" };
  if (level >= M1) return { label: "Erhöht", color: "#C26A1A" };
  if (level >= MEAN - 0.10) return { label: "Normal", color: "#0080B8" };
  return { label: "Niedrig", color: "#6B7785" };
}
function wxIcon(f) {
  if (f.snow > 1) return "❄";
  if (f.precip > 5) return "🌧";
  if (f.precip > 1) return "🌦";
  if (f.tMax > 20) return "☀";
  return "⛅";
}
function ageText(ts) {
  var mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 2) return "gerade eben";
  if (mins < 60) return "vor " + mins + " Min";
  var h = Math.round(mins / 60);
  if (h < 24) return "vor " + h + " h";
  return "vor " + Math.floor(h / 24) + " Tagen";
}
