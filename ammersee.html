    '<path d="M0,' + (waterY+22) + ' Q80,' + (waterY+20) + ' 160,' + (waterY+22) + ' T320,' + (waterY+22) + ' T400,' + (waterY+22) + '" stroke="rgba(255,255,255,0.16)" stroke-width="0.6" fill="none"/>' +
    '</svg>';
  
  return '<div class="scene">' + svg +
    '<div class="scene-overlay">' +
      '<div class="scene-top"><div><div class="scene-loc">Pegel Stegen</div><div class="scene-name">Ammersee</div></div>' +
      '<div class="scene-pill"><span class="scene-pill-dot" style="background:' + st.color + '"></span><span class="scene-pill-text" style="color:' + st.color + '">' + st.label + '</span></div></div>' +
      '<div class="scene-bottom"><div style="font-size:36px">' + icon + '</div><div class="scene-temp">' + Math.round(f0.tMax) + '°</div></div>' +
    '</div></div>';
}

function buildChart(level, fc, band) {
  var W = 340, H = 215, pad = 18;  // even taller — extra space for weather icons row under labels
  // Use tagweise min/max (not global dry/wet - lines may cross)
  var minVals = band ? [level].concat(band.bandMin) : null;
  var maxVals = band ? [level].concat(band.bandMax) : null;
  var baseVals = [level].concat(fc.map(function(f){return f.level;}));
  var ref = baseVals.slice();
  if (minVals) ref = ref.concat(minVals, maxVals);
  ref.push(MEAN);
  var mn = Math.min.apply(null, ref) - 0.06;
  var mx = Math.max.apply(null, ref) + 0.06;
  var rng = mx - mn || 0.1;
  
  function mkPts(vals) {
    return vals.map(function(v, i) {
      return { x: (i / (vals.length - 1)) * (W - pad * 2) + pad, y: H - 46 - ((v - mn) / rng) * (H - 72) };
    });
  }
  var pts = mkPts(baseVals);
  var line = pts.map(function(p){return p.x+","+p.y;}).join(" ");
  var mY = H - 46 - ((MEAN - mn) / rng) * (H - 72);
  
  // Uncertainty band polygon: tagweise min as lower, max as upper
  var bandPath = "";
  if (band) {
    var pMin = mkPts(minVals);
    var pMax = mkPts(maxVals);
    var upper = pMax.map(function(p){return p.x+","+p.y;}).join(" L");
    var lower = pMin.slice().reverse().map(function(p){return p.x+","+p.y;}).join(" L");
    bandPath = "M" + upper + " L" + lower + " Z";
  }
  
  // Identify the "relevant" day: biggest absolute level change OR first MS1 crossing
  var relevant = findRelevantDay(fc, level);
  var relevantPtIdx = relevant ? relevant.idx + 1 : -1;  // +1 because pts[0] is "today"
  
  var circles = "", labels = "", icons = "", peakLabel = "";
  var dayL = ["Jetzt"].concat(fc.map(function(f){return f.day;}));
  // Map each day to a weather icon (Jetzt uses today's, others use forecast day)
  var iconL = [wxIcon(fc[0])].concat(fc.map(function(f){return wxIcon(f);}));
  pts.forEach(function(p, i) {
    var isNow = i === 0;
    var isPeak = i === relevantPtIdx;
    var r = isNow ? 6 : (isPeak ? 5 : 3.5);
    var fl = isNow ? "#0080B8" : (isPeak ? "#C26A1A" : "#00A3E0");
    var stroke = isNow || isPeak ? 3 : 2.5;
    circles += '<circle cx="' + p.x + '" cy="' + p.y + '" r="' + r + '" fill="' + fl + '" stroke="white" stroke-width="' + stroke + '"/>';
    // Day label
    labels += '<text x="' + p.x + '" y="' + (H - 22) + '" fill="' + (isNow ? "#0080B8" : isPeak ? "#C26A1A" : "#8B99A8") + '" font-size="10" text-anchor="middle" font-weight="' + (isNow || isPeak ? "700" : "500") + '">' + dayL[i] + '</text>';
    // Weather icon UNDER the day label — the user-requested addition
    icons += '<text x="' + p.x + '" y="' + (H - 6) + '" font-size="15" text-anchor="middle" opacity="0.85">' + iconL[i] + '</text>';
  });
  
  // Peak marker label: small callout above the relevant day's point
  if (relevant && relevantPtIdx >= 0 && relevantPtIdx < pts.length) {
    var pp = pts[relevantPtIdx];
    var labelY = pp.y - 12;
    var labelTxt = fmtNum(relevant.day.level) + " m";
    var textAnchor = (pp.x > W - 60) ? "end" : (pp.x < 60) ? "start" : "middle";
    var textX = pp.x;
    peakLabel = '<g>' +
      '<text x="' + textX + '" y="' + labelY + '" fill="#C26A1A" font-size="10.5" font-weight="700" text-anchor="' + textAnchor + '">' + labelTxt + '</text>' +
    '</g>';
  }
  
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block">' +
    '<defs><linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,163,224,0.24)"/><stop offset="100%" stop-color="rgba(0,163,224,0)"/></linearGradient></defs>' +
    '<line x1="' + pad + '" y1="' + mY + '" x2="' + (W-pad) + '" y2="' + mY + '" stroke="rgba(0,128,184,0.3)" stroke-width="1" stroke-dasharray="3,3"/>' +
    '<text x="' + (W-pad) + '" y="' + (mY-5) + '" fill="#0080B8" font-size="9" text-anchor="end" font-weight="600">Mittel ' + fmtNum(MEAN) + '</text>' +
    (bandPath ? '<path d="' + bandPath + '" fill="rgba(0,163,224,0.15)" stroke="none"/>' : '') +
    '<polyline points="' + line + '" fill="none" stroke="#0080B8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    circles + peakLabel + labels + icons + '</svg>';
}

function buildCompareChart(level, fcA, fcB) {
  var W = 340, H = 130, pad = 18;
  var vA = [level].concat(fcA.map(function(f){return f.level;}));
  var vB = [level].concat(fcB.map(function(f){return f.level;}));
  var all = vA.concat(vB).concat([MEAN]);
  var mn = Math.min.apply(null, all) - 0.03, mx = Math.max.apply(null, all) + 0.03, rng = mx - mn || 0.1;
  var toPts = function(vs) { return vs.map(function(v,i){return{x:(i/(vs.length-1))*(W-pad*2)+pad,y:H-20-((v-mn)/rng)*(H-36)};}); };
  var pA = toPts(vA), pB = toPts(vB);
  var lA = pA.map(function(p){return p.x+","+p.y;}).join(" ");
  var lB = pB.map(function(p){return p.x+","+p.y;}).join(" ");
  var mY = H - 20 - ((MEAN - mn) / rng) * (H - 36);
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block">' +
    '<line x1="' + pad + '" y1="' + mY + '" x2="' + (W-pad) + '" y2="' + mY + '" stroke="rgba(0,32,64,0.15)" stroke-width="1" stroke-dasharray="2,3"/>' +
    '<polyline points="' + lA + '" fill="none" stroke="#8294A8" stroke-width="2" stroke-dasharray="4,3" stroke-linejoin="round"/>' +
    '<polyline points="' + lB + '" fill="none" stroke="#0080B8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    pA.map(function(p){return '<circle cx="' + p.x + '" cy="' + p.y + '" r="2.5" fill="#8294A8"/>';}).join('') +
    pB.map(function(p){return '<circle cx="' + p.x + '" cy="' + p.y + '" r="3" fill="#0080B8" stroke="white" stroke-width="1.5"/>';}).join('') +
    '</svg>';
}

// ============================================================
// EXPLAIN (forecast narrative)
// ============================================================
function explain(level, fc) {
  var totCm = (fc[fc.length-1].level - level) * 100;
  var totP = fc.reduce(function(s,f){return s+f.precip;},0);
  var totS = fc.reduce(function(s,f){return s+(f.snow||0);},0);
  var fcDry = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, level, Object.assign({}, state.params, { precipMult: 0 }), state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var totDry = (fcDry[fcDry.length-1].level - level) * 100;
  var maxRain = 0, maxRainDay = null;
  fc.forEach(function(f){if(f.precip>maxRain){maxRain=f.precip;maxRainDay=f;}});
  var maxT = Math.max.apply(null, fc.map(function(f){return f.tMax;}));
  var avgT = fc.reduce(function(s,f){return s+f.tMean;},0) / fc.length;
  var dirText, dirCol;
  if (Math.abs(totCm) < 1) { dirText = "bleibt der Pegel weitgehend stabil"; dirCol = "#546478"; }
  else if (totCm > 0) { dirText = "steigt der Pegel um " + pmNum(totCm, 1) + " cm"; dirCol = "#0080B8"; }
  else { dirText = "fällt der Pegel um " + Math.abs(totCm).toFixed(1).replace(".",",") + " cm"; dirCol = "#C26A1A"; }
  var drivers = [];
  if (maxRain > 5) drivers.push({ c: "#0080B8", t: "<b>" + maxRain.toFixed(1).replace(".",",") + " mm Regen</b> am " + maxRainDay.dayLong });
  else if (totP > 3) drivers.push({ c: "#0080B8", t: "<b>" + Math.round(totP) + " mm Niederschlag</b> über die Woche" });
  else drivers.push({ c: "#C26A1A", t: "<b>Kaum Niederschlag</b> (nur " + totP.toFixed(1).replace(".",",") + " mm)" });
  if (totS > 5) drivers.push({ c: "#7FA3C7", t: "<b>Schneefall</b> — Beitrag erst bei Tauwetter" });
  if (maxT > 25) drivers.push({ c: "#E8A55C", t: "<b>Hitzetage</b> bis " + Math.round(maxT) + "°C — erhöhte Verdunstung" });
  else if (avgT < 5) drivers.push({ c: "#7FA3C7", t: "<b>Kühle Temperaturen</b> (Mittel " + avgT.toFixed(1).replace(".",",") + "°C)" });
  var cf, rainEff = totCm - totDry;
  if (totP < 1) cf = "Der See verliert langsam Wasser durch Abfluss und Verdunstung.";
  else if (Math.abs(rainEff) > 1) cf = "Ohne den Regen würde der Pegel um " + Math.abs(totDry).toFixed(1).replace(".",",") + " cm " + (totDry < 0 ? "fallen" : "steigen") + " — der Niederschlag macht den Unterschied.";
  else cf = "Ohne Niederschlag würde sich nur wenig ändern — die Bilanz ist ausgeglichen.";
  return { dirText: dirText, dirCol: dirCol, drivers: drivers, cf: cf, totCm: totCm };
}

function paramsChanged() {
  return JSON.stringify(state.params) !== JSON.stringify(DEFAULTS);
}

// Translate band width into a human confidence label.
// A 7-day Ammersee forecast with <5cm spread is highly skillful (rare, mostly very dry/stable).
// 5-15cm spread is typical for the climate — calling it "mittel" is honest.
// Above 15cm means the weather drivers diverge materially across scenarios/members.
function computeConfidence(bandResult, lv) {
  if (!bandResult || !bandResult.bandMin || !bandResult.bandMax) return null;
  var lastIdx = bandResult.bandMin.length - 1;
  var spread_cm = (bandResult.bandMax[lastIdx] - bandResult.bandMin[lastIdx]) * 100;
  if (spread_cm < 5) return { label: "Prognose robust", col: "#4A8A4F", spread: spread_cm };
  if (spread_cm < 15) return { label: "Prognose mittel unsicher", col: "#B28A1A", spread: spread_cm };
  return { label: "Prognose unsicher", col: "#C26A1A", spread: spread_cm };
}

// Find the most "interesting" day in the forecast: biggest absolute level change
// from today, or the first day that crosses MS1 if any. Used for the Peak marker.
function findRelevantDay(fc, lv) {
  if (!fc || fc.length === 0) return null;
  // Prefer the first MS1 crossing if any
  for (var i = 0; i < fc.length; i++) {
    if (fc[i].level >= M1) return { idx: i, day: fc[i], reason: "MS1 erreicht" };
  }
  // Otherwise the day with biggest absolute delta from current
  var bestIdx = 0, bestAbs = 0;
  for (var j = 0; j < fc.length; j++) {
    var absD = Math.abs(fc[j].level - lv);
    if (absD > bestAbs) { bestAbs = absD; bestIdx = j; }
  }
  if (bestAbs < 0.01) return null;  // nothing notable
  var d = fc[bestIdx];
  var reason = d.level > lv ? "Höchststand" : "Tiefststand";
  return { idx: bestIdx, day: d, reason: reason };
}

// Five-step activity rating scale.
// Higher score = better/safer. Central to all activity assessments.
// Colors are on a green → amber → red gradient, consistently applied across Baden/Ufer/Steg.
var ACTIVITY_LEVELS = [
  { key: "nicht_empfohlen", label: "nicht empfohlen", col: "#C93030", score: 0 },
  { key: "eingeschraenkt",  label: "eingeschränkt",  col: "#C26A1A", score: 1 },
  { key: "bedingt",         label: "bedingt",        col: "#B28A1A", score: 2 },
  { key: "gut",             label: "gut",            col: "#4A8A4F", score: 3 },
  { key: "ideal",           label: "ideal",          col: "#2E7A34", score: 4 }
];
function rate(score) {
  score = Math.max(0, Math.min(4, Math.round(score)));
  return ACTIVITY_LEVELS[score];
}

// Estimate Ammersee water surface temperature from month + recent warm days.
// Based on multi-year observations at the Ammersee (typical values):
//   Jan/Feb: 3-5°C · Mar: 5°C · Apr: 8°C · May: 12°C · Jun: 17°C
//   Jul/Aug: 21°C  · Sep: 18°C · Oct: 14°C · Nov: 9°C · Dec: 5°C
// Surface layer responds to air temp with ~5-7 day lag, so recent tMax nudges up.
function estimateWaterTemp(fc) {
  var month = new Date().getMonth() + 1; // 1-12
  var baseByMonth = [0, 4, 5, 6, 9, 13, 17, 21, 21, 18, 14, 9, 5];
  var waterT = baseByMonth[month];
  // Warm-air boost: average tMax of last 3 days (spin-up) above 20°C warms the surface
  var recentTMax = fc.slice(0, 3).reduce(function(s,f){return s + f.tMax;}, 0) / 3;
  if (recentTMax > 22) waterT += 1.5;
  else if (recentTMax > 18) waterT += 0.5;
  return waterT;
}

// Baden rating — 5-step, water-temperature-aware.
// Key insight: air temp in April can be 25°C while water is still 7°C. The prior
// heuristic was wrong because it looked only at air tMax.
function rateBaden(lv, fc) {
  if (lv >= M3) return Object.assign({}, rate(0), { reason: "Meldestufe 3 — kritisch" });
  var waterT = estimateWaterTemp(fc);
  var totalRain = fc.slice(0, 3).reduce(function(s,f){return s + (f.precip || 0);}, 0);
  var score;
  if (waterT >= 20) score = 4;       // ideal: ≥20°C
  else if (waterT >= 17) score = 3;  // gut: 17-20°C
  else if (waterT >= 14) score = 2;  // bedingt: 14-17°C
  else if (waterT >= 10) score = 1;  // eingeschränkt: 10-14°C (abgehärtet)
  else score = 0;                    // nicht empfohlen: <10°C
  // Penalties
  if (lv >= M1) score = Math.min(score, 1);  // flood overrides
  if (totalRain > 30) score = Math.max(0, score - 1);
  var r = rate(score);
  var reason;
  if (lv >= M1) reason = "Hochwasser";
  else if (waterT < 10) reason = "Wasser ~" + Math.round(waterT) + "°C — zu kalt";
  else if (waterT < 14) reason = "Wasser ~" + Math.round(waterT) + "°C — kurz & abgehärtet";
  else if (waterT < 17) reason = "Wasser ~" + Math.round(waterT) + "°C";
  else if (waterT < 20) reason = "Wasser ~" + Math.round(waterT) + "°C — angenehm";
  else reason = "Wasser ~" + Math.round(waterT) + "°C — warm";
  return Object.assign({}, r, { reason: reason, waterT: waterT });
}

// Ufer rating — path conditions, driven by lake level vs mean.
function rateUfer(lv, fc) {
  var score;
  if (lv >= M3) score = 0;
  else if (lv >= M1) score = 1;
  else if (lv >= MEAN + 0.30) score = 2;
  else if (lv >= MEAN + 0.15) score = 3;
  else score = 4;  // ideal: within ±15cm of mean
  // Rising-fast penalty
  var tot7 = (fc[fc.length-1].level - lv) * 100;
  if (tot7 > 15 && score > 1) score -= 1;
  var r = rate(score);
  var reason;
  if (lv >= M3) reason = "MS3 — Ufer überflutet";
  else if (lv >= M1) reason = "MS1 — Wege nass/gesperrt";
  else if (lv >= MEAN + 0.30) reason = "deutlich über Mittel";
  else if (lv >= MEAN + 0.15) reason = "leicht erhöht";
  else reason = "Wege frei";
  return Object.assign({}, r, { reason: reason });
}

// Steg rating — Sebastian's private slipway at Ammersee.
// Optimal window: within ±15cm of mean. Low water makes slipping difficult,
// high water starts to cover the apron. MS1+ is unambiguously a problem.
function rateSteg(lv, fc) {
  var dFromMean = lv - MEAN;  // meters
  var score;
  if (lv >= M1) score = 1;                             // over MS1: hoch
  else if (dFromMean > 0.35) score = 1;                // >+35cm: nur noch eingeschränkt
  else if (dFromMean > 0.20) score = 2;                // +20 bis +35cm: bedingt
  else if (dFromMean < -0.35) score = 1;               // <-35cm: zu niedrig
  else if (dFromMean < -0.20) score = 2;               // -35 bis -20cm: bedingt
  else if (Math.abs(dFromMean) <= 0.10) score = 4;     // ±10cm: ideal
  else score = 3;                                      // ±10 to ±20cm: gut
  // Rising fast: downgrade
  var tot7 = (fc[fc.length-1].level - lv) * 100;
  if (tot7 > 15 && score > 1) score -= 1;
  var r = rate(score);
  var reason;
  if (lv >= M1) reason = "Pegel über MS1";
  else if (dFromMean > 0.35) reason = Math.round(dFromMean*100) + "cm über Mittel";
  else if (dFromMean > 0.20) reason = Math.round(dFromMean*100) + "cm über Mittel";
  else if (dFromMean < -0.35) reason = Math.abs(Math.round(dFromMean*100)) + "cm unter Mittel";
  else if (dFromMean < -0.20) reason = Math.abs(Math.round(dFromMean*100)) + "cm unter Mittel";
  else if (Math.abs(dFromMean) <= 0.10) reason = "Pegel im Normbereich";
  else reason = (dFromMean >= 0 ? "+" : "") + Math.round(dFromMean*100) + "cm vom Mittel";
  return Object.assign({}, r, { reason: reason });
}

// Build the "Heute relevant" activity card — consumer-friendly status for typical lake uses.
// Color-only treatment: no emoji icons, matching the 5-step scale as described in Model tab.
// Each item gets a colored top-border matching its rating, and the status word itself is rendered
// in the same color — so you see at a glance whether Baden/Ufer/Steg are green/amber/red.
function buildActivityCard(lv, fc, st) {
  var baden = rateBaden(lv, fc);
  var ufer  = rateUfer(lv, fc);
  var steg  = rateSteg(lv, fc);
  
  var items = [
    { label: "Baden", rating: baden },
    { label: "Ufer",  rating: ufer  },
    { label: "Steg",  rating: steg  }
  ];
  
  var chips = items.map(function(it) {
    var r = it.rating;
    return '<div class="activity-item" style="border-top-color:' + r.col + '">' +
      '<div class="activity-label">' + it.label + '</div>' +
      '<div class="activity-status" style="color:' + r.col + '">' + r.label + '</div>' +
      '<div class="activity-sub">' + r.reason + '</div>' +
    '</div>';
  }).join('');
  
  return '<div class="card activity-card">' +
    '<div class="cardh">Heute relevant<span class="cardh-r">Erklärung im Modell-Tab</span></div>' +
    '<div class="activity-grid">' + chips + '</div>' +
  '</div>';
}

// Build the "Zufluss-Vorwarnkette" card showing upstream Ammer gauges
// Each gauge shows current Q + expected lake impact time + direction arrow
function buildInflowChain(st) {
  // Each stage: name, Q, lag to lake (hours), color
  // Lag times from Zebrafell + geography:
  // Oberammergau → Ammersee impact: ~48h
  // Peißenberg → Ammersee impact: ~30h
  // Weilheim → Ammersee impact: ~18-24h
  var stages = [
    { name: "Oberammergau", shortName: "Oberamm.", q: st.ammerOberammQ, lagH: 48, col: "#0080B8", role: "Alpen" },
    { name: "Peißenberg",   shortName: "Peißenbg", q: st.ammerPeissQ,   lagH: 30, col: "#00A3E0", role: "nach Schlucht" },
    { name: "Weilheim",     shortName: "Weilheim", q: st.ammerQ,        lagH: 18, col: "#39B4DE", role: "vor See" }
  ];
  
  var availableStages = stages.filter(function(s) { return s.q != null; });
  if (availableStages.length === 0) return "";
  
  // Trend detection: if upstream is significantly higher than downstream, wave incoming.
  // Wording is deliberately soft — a single-gauge ratio is an indicator, not a forecast.
  var trend = "Oberlauf stabil";
  var trendCol = "#4A5A6E";
  if (st.ammerPeissQ != null && st.ammerQ != null) {
    var ratio = st.ammerQ > 0.1 ? (st.ammerPeissQ / st.ammerQ) : 0;
    if (ratio > 0.55) {
      trend = "Oberlauf erhöht — zusätzlicher Zufluss wahrscheinlich";
      trendCol = "#C26A1A";
    } else if (ratio < 0.35) {
      trend = "Oberlauf fällt — Zuflussimpuls eher rückläufig";
      trendCol = "#4A8A4F";
    }
  }
  
  // For each node, derive a direction indicator by comparing to the next upstream gauge.
  // Upstream higher (when scaled) → wave rising at THIS node → ↑
  // Upstream lower → wave receding → ↓
  // Thresholds are ±15% since gauges carry noise and scale factors are approximate.
  function nodeDirection(stage, upstreamQ, upstreamScale) {
    if (stage.q == null || upstreamQ == null) return { arrow: "→", col: "#8294A8" };
    var expectedFromUp = upstreamQ * upstreamScale;
    if (expectedFromUp > stage.q * 1.15) return { arrow: "↑", col: "#C26A1A" };
    if (expectedFromUp < stage.q * 0.85) return { arrow: "↓", col: "#4A8A4F" };
    return { arrow: "→", col: "#6B87A0" };
  }
  // Scale factors: MQ ratio to next-downstream gauge
  //   Oberammergau → Peißenberg ≈ 1 : 1.75 (Peißenberg catchment 4× bigger)
  //   Peißenberg  → Weilheim    ≈ 1 : 1.7  (Weilheim catchment ~1.7×)
  var dirOberamm = nodeDirection(stages[0], null, 1);  // no further upstream
  var dirPeiss = nodeDirection(stages[1], st.ammerOberammQ, 1.75);
  var dirWeilheim = nodeDirection(stages[2], st.ammerPeissQ, 2.3);
  var directions = [dirOberamm, dirPeiss, dirWeilheim];
  
  var nodes = stages.map(function(s, i) {
    var hasData = s.q != null;
    var qStr = hasData ? s.q.toFixed(1).replace(".", ",") + " m³/s" : "n/v";
    var color = hasData ? s.col : "#C0C8D4";
    var dir = directions[i];
    var arrowHtml = hasData ? '<span class="inflow-arrow-dir" style="color:' + dir.col + '">' + dir.arrow + '</span>' : '';
    return '<div class="inflow-node">' +
      '<div class="inflow-lag">+' + s.lagH + 'h</div>' +
      '<div class="inflow-dot" style="background:' + color + '"></div>' +
      '<div class="inflow-name">' + s.shortName + '</div>' +
      '<div class="inflow-q" style="color:' + color + '">' + qStr + ' ' + arrowHtml + '</div>' +
      '<div class="inflow-role">' + s.role + '</div>' +
    '</div>';
  }).join('<div class="inflow-arrow">→</div>');
  
  // Add lake as terminal node
  nodes += '<div class="inflow-arrow">→</div>' +
    '<div class="inflow-node inflow-lake">' +
      '<div class="inflow-lag" style="visibility:hidden">0h</div>' +
      '<div class="inflow-dot" style="background:#0077A0;width:14px;height:14px"></div>' +
      '<div class="inflow-name">Ammersee</div>' +
      '<div class="inflow-q" style="color:#0077A0">' + fmtNum(st.level) + ' m</div>' +
      '<div class="inflow-role">Pegel Stegen</div>' +
    '</div>';
  
  return '<div class="card inflow-card">' +
    '<div class="cardh">Ammer-Zufluss-Vorwarnkette<span class="cardh-r">' + availableStages.length + '/3 Pegel live</span></div>' +
    '<div class="inflow-chain">' + nodes + '</div>' +
    '<div class="inflow-trend" style="color:' + trendCol + '">' + trend + '</div>' +
  '</div>';
}

// ============================================================
// RENDER: OVERVIEW
// ============================================================
function renderOverview() {
  var lv = state.level, fc = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var today = fc[0];
  var diff = (lv - MEAN) * 100;
  var tot = (fc[fc.length-1].level - lv) * 100;
  var totP = fc.reduce(function(s,f){return s+f.precip;},0);
  var hasSnow = fc.some(function(f){return f.snow > 1;});
  // maxL is computed later, after potential ensemble-median fc swap, so the
  // "Meldestufe 1 möglich" trigger reflects the actual displayed curve.
  var desc;
  if (totP < 3) desc = "Kaum Niederschlag in den nächsten 7 Tagen.";
  else if (totP < 15) desc = Math.round(totP) + " mm Niederschlag erwartet.";
  else desc = Math.round(totP) + " mm Niederschlag" + (hasSnow ? " mit Schneeanteil" : "") + " erwartet.";
  var diffCol = diff >= -2 ? "#0080B8" : "#C26A1A";
  var bMin = 532.0, bMax = 534.5;
  var lvP = Math.max(0, Math.min(100, ((lv - bMin) / (bMax - bMin)) * 100));
  var meanP = ((MEAN - bMin) / (bMax - bMin)) * 100;
  var m1P = ((M1 - bMin) / (bMax - bMin)) * 100;
  var m3P = ((M3 - bMin) / (bMax - bMin)) * 100;
  var pinC = lv >= M3 ? "#C93030" : lv >= M1 ? "#C26A1A" : lv >= MEAN - 0.10 ? "#0080B8" : "#6B7785";
  var src = state.isAuto ? "automatisch · " + ageText(state.timestamp) : "manuell · " + ageText(state.timestamp);

  var rows = "";
  fc.forEach(function(f) {
    var dc = f.delta, dcC = dc > 1 ? "#0080B8" : dc < -1 ? "#C26A1A" : "#8294A8";
    var pw = Math.min((f.precip / 15) * 100, 100);
    var ps = f.precip >= 0.5 ? f.precip.toFixed(1) + " mm" : "–";
    var bg = f.snow > 1 ? "linear-gradient(90deg,#C5D4E0,#7FA3C7)" : "linear-gradient(90deg,#5BB8E8,#0080B8)";
    rows += '<div class="row' + (f.isToday ? ' today' : '') + '">' +
      '<div class="day">' + f.day + '<small>' + f.date + '</small></div>' +
      '<div class="ic">' + wxIcon(f) + '</div>' +
      '<div class="pbar"><div class="fill" style="width:' + pw + '%;background:' + bg + '"></div></div>' +
      '<div class="pval">' + ps + '</div>' +
      '<div class="temps"><span class="tmin">' + Math.round(f.tMin) + '°</span>/<span>' + Math.round(f.tMax) + '°</span></div>' +
      '<div class="delta" style="color:' + dcC + '">' + pmNum(dc, 1) + '</div>' +
      '</div>';
  });

  // Try ensemble band first (DWD ICON-EPS); fall back to heuristic 3-scenario band.
  // Minimum member count: 5 — below that the ensemble spread is not statistically
  // meaningful and the heuristic 3-scenario band gives a cleaner signal.
  var bandResult = null;
  var bandSource = "Szenarien";
  var nMembers = 0;
  if (state.ensembleMembers && state.ensembleMembers.length >= 5) {
    var histDays = state.weatherDays.slice(0, state.forecastStart);
    bandResult = runEnsembleBand(histDays, state.ensembleMembers, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
    if (bandResult && bandResult.nMembers >= 5) {
      bandSource = "Ensemble";
      nMembers = bandResult.nMembers;
      // IMPORTANT: when ensemble is active, the plotted "main line" should be the
      // ensemble median (P50), not the deterministic single run. Otherwise the
      // line and the band can disagree in ways that confuse the reader.
      fc = bandResult.base;
    }
  }
  if (!bandResult) {
    bandResult = runForecastBand(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  }
  var lastIdx = bandResult.base.length - 1;
  var totBandMin = (bandResult.bandMin[lastIdx] - lv) * 100;
  var totBandMax = (bandResult.bandMax[lastIdx] - lv) * 100;
  // Recompute tot and maxL AFTER potential ensemble-median swap, so both the
  // trend copy ("Meldestufe 1 möglich") and the displayed curve agree.
  tot = (fc[fc.length-1].level - lv) * 100;
  var maxL = Math.max.apply(null, fc.map(function(f){return f.level;}));
  var trend;
  if (maxL >= M1) trend = "Meldestufe 1 möglich";
  else if (Math.abs(tot) < 2) trend = "Weitgehend stabil";
  else if (tot > 5) trend = "Deutlich steigend";
  else if (tot > 0) trend = "Leicht steigend";
  else if (tot > -5) trend = "Leicht fallend";
  else trend = "Deutlich fallend";
  var totCol = Math.abs(tot) < 2 ? "#546478" : tot > 0 ? "#0080B8" : "#C26A1A";
  var exp = explain(lv, fc);
  var driversHtml = "";
  exp.drivers.forEach(function(d) {
    // Chip-style: colored pill with driver text (HTML preserved from explain())
    driversHtml += '<div class="driver-chip" style="border-color:' + d.c + '33;color:' + d.c + '">' + d.t + '</div>';
  });

  var devHtml = "";
  if (paramsChanged()) {
    var fcDef = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, DEFAULTS, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
    var totDef = (fcDef[fcDef.length-1].level - lv) * 100;
    var d = exp.totCm - totDef;
    var parts = [];
    if (Math.abs(state.params.precipMult - 1) > 0.01) parts.push("Niederschlag " + state.params.precipMult.toFixed(2).replace(".",",") + "×");
    if (Math.abs(state.params.rcPeak - DEFAULTS.rcPeak) > 0.01) parts.push("Peak-RC " + (state.params.rcPeak * 100).toFixed(0) + "%");
    if (Math.abs(state.params.evapMult - 1) > 0.01) parts.push("Verdunstung " + state.params.evapMult.toFixed(2).replace(".",",") + "×");
    devHtml = '<div class="dev">' +
      '<div class="dev-head">⚠ Modell angepasst</div>' +
      '<div class="dev-params">' + parts.join(" · ") + '</div>' +
      '<div class="dev-diff">' + (Math.abs(d) >= 1 ? 'Weicht um <b style="color:' + (d > 0 ? '#0080B8' : '#C26A1A') + '">' + pmNum(d, 1) + ' cm</b> vom Standard ab.' : 'Nur geringe Abweichung vom Standard-Modell.') + '</div>' +
      '<a class="dev-reset" data-action="reset-params">Auf Standard zurücksetzen</a></div>';
  }

  var banner = state.autoFailed ? '<div class="banner">⚠ Automatik fehlgeschlagen — zeige letzten Wert. <a data-action="edit">Manuell setzen</a></div>' : '';
  
  // Compute short status line ("Normal · leicht fallend") and key facts
  var statusWord;
  if (lv >= M3) statusWord = "Meldestufe 3";
  else if (lv >= M1) statusWord = "Meldestufe 1";
  else if (lv >= MEAN + 0.20) statusWord = "Erhöht";
  else if (lv <= MEAN - 0.20) statusWord = "Niedrig";
  else statusWord = "Normal";
  
  var trendShort;
  if (Math.abs(tot) < 2) trendShort = "stabil";
  else if (tot > 5) trendShort = "deutlich steigend";
  else if (tot > 0) trendShort = "leicht steigend";
  else if (tot > -5) trendShort = "leicht fallend";
  else trendShort = "deutlich fallend";
  
  var cmToMS1 = Math.round((M1 - lv) * 100);
  var ms1FactLabel, ms1FactColor;
  if (lv >= M3) { ms1FactLabel = "über MS3"; ms1FactColor = "#C93030"; }
  else if (lv >= M1) {
    var cmToMS3 = Math.round((M3 - lv) * 100);
    ms1FactLabel = cmToMS3 + " cm bis Meldestufe 3";
    ms1FactColor = "#C26A1A";
  } else if (cmToMS1 < 30) {
    ms1FactLabel = cmToMS1 + " cm bis Meldestufe 1";
    ms1FactColor = "#C26A1A";
  } else {
    ms1FactLabel = Math.abs(Math.round(diff)) + " cm " + (diff >= 0 ? "über" : "unter") + " Mittel";
    ms1FactColor = diff >= -10 ? "#0080B8" : "#C26A1A";
  }
  
  var tot7Label = "Nächste 7 Tage: " + pmNum(tot, 1) + " cm";
  var tot7Color = Math.abs(tot) < 2 ? "#546478" : tot > 0 ? "#0080B8" : "#C26A1A";
  
  var statusDotColor = lv >= M3 ? "#C93030" : lv >= M1 ? "#C26A1A" : statusWord === "Erhöht" ? "#B28A1A" : statusWord === "Niedrig" ? "#6B87A0" : "#4A8A4F";
  
  // Confidence label from the displayed band
  var confidence = computeConfidence(bandResult, lv);
  var confidenceBadge = confidence ? '<span class="confidence-badge" style="color:' + confidence.col + ';border-color:' + confidence.col + '">' + confidence.label + '</span>' : '';

  return buildScene(lv, today) +
    banner +
    '<div class="hero">' +
      '<div class="hero-head">' +
        '<span class="hero-label">Aktueller Pegel</span>' +
        '<div class="hero-actions"><span class="hero-source">' + src + '</span><button class="edit-btn" data-action="edit" aria-label="Pegel manuell setzen" title="Pegel setzen">✎</button></div>' +
      '</div>' +
      '<div class="hero-lv"><span class="hero-num">' + fmtNum(lv) + '</span><span class="hero-unit">m</span></div>' +
      '<div class="hero-status">' +
        '<span class="status-dot" style="background:' + statusDotColor + '"></span>' +
        '<span class="status-text"><b style="color:' + statusDotColor + '">' + statusWord + '</b> · ' + trendShort + '</span>' +
      '</div>' +
      '<div class="hero-facts">' +
        '<div class="fact"><span class="fact-v" style="color:' + tot7Color + '">' + tot7Label + '</span></div>' +
        '<div class="fact-sep">·</div>' +
        '<div class="fact"><span class="fact-v" style="color:' + ms1FactColor + '">' + ms1FactLabel + '</span></div>' +
      '</div>' +
      '<div class="levelbar">' +
        '<div class="levelbar-mark" style="left:' + meanP + '%"><div class="levelbar-mark-label">Mittel</div></div>' +
        '<div class="levelbar-mark" style="left:' + m1P + '%"><div class="levelbar-mark-label">MS1</div></div>' +
        '<div class="levelbar-mark" style="left:' + m3P + '%"><div class="levelbar-mark-label">MS3</div></div>' +
        '<div class="levelbar-pin" style="left:' + lvP + '%;background:' + pinC + '"></div>' +
      '</div>' +
    '</div>' +
    // NEW: activity card ("Heute relevant")
    buildActivityCard(lv, fc, state) +
    // Main chart card - now with peak marker and confidence badge
    '<div class="card chartcard">' +
      '<div class="cardh">Pegelverlauf<span class="cardh-r">' + (bandSource === 'Ensemble' ? 'Ensemble · ' + nMembers + ' Member' : 'Szenarien-Band') + '</span></div>' +
      buildChart(lv, fc, bandResult) +
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 6px 0;gap:8px;flex-wrap:wrap">' +
        '<span style="font-size:10px;color:#8294A8">' + (bandSource === 'Ensemble' ? 'DWD ICON-EPS · Linie = Median' : 'Linie = Prognose · Band = Szenarien') + '</span>' +
        confidenceBadge +
      '</div>' +
    '</div>' +
    buildInflowChain(state) +
    // Modularized "Warum" card — driver chips + short copy
    '<div class="card explain">' +
      '<div class="cardh">Was passiert diese Woche</div>' +
      '<div class="explain-sum">Pegel <b style="color:' + exp.dirCol + '">' + exp.dirText + '</b> · Band ' + pmNum(totBandMin, 0) + ' bis ' + pmNum(totBandMax, 0) + ' cm</div>' +
      '<div class="driver-chips">' + driversHtml + '</div>' +
      '<div class="explain-cf">' + exp.cf + '</div>' +
      devHtml +
    '</div>' +
    // Reference pointer to 7-day tab (instead of the full grid on overview)
    '<div class="card link-card" data-action="tab-days">' +
      '<div class="link-card-row">' +
        '<div><div class="link-card-t">Tagesdetails ansehen</div><div class="link-card-s">Alle 7 Tage mit Regen, Temperaturen, Δ</div></div>' +
        '<div class="link-card-arrow">→</div>' +
      '</div>' +
    '</div>' +
    '<div class="ftr">' +
      '<div>Wetter DWD ICON-D2 (Open-Meteo, FAO-56 ET₀)' + (state.ensembleMembers ? ' + <b>ICON-EPS</b> ' + state.ensembleMembers.length + ' Member' : '') + '</div>' +
      '<div style="margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#4A5A6E">' +
        (state.ammerQ != null ? '<span>Ammer zu: <b style="color:#0080B8">' + state.ammerQ.toFixed(1).replace(".",",") + ' m³/s</b></span>' : '<span>Ammer: n/v</span>') +
        (state.amperOut != null ? '<span>Amper ab: <b style="color:#C26A1A">' + state.amperOut.toFixed(1).replace(".",",") + ' m³/s</b></span>' : '<span>Amper ab: n/v</span>') +
        (state.ammerQ != null && state.amperOut != null ? '<span>Saldo: <b>' + ((state.ammerQ/0.79 - state.amperOut) >= 0 ? "+" : "") + (state.ammerQ/0.79 - state.amperOut).toFixed(1).replace(".",",") + ' m³/s</b></span>' : '') +
      '</div>' +
      '<div style="margin-top:4px">Pegel Stegen HND · <a data-action="edit">manuell setzen</a> · <a href="' + HND_URL + '" target="_blank" rel="noopener noreferrer">HND.Bayern</a> · <a href="' + AMMER_URL + '" target="_blank" rel="noopener noreferrer">Ammer Weilheim</a></div>' +
    '</div>';
}

// ============================================================
// RENDER: DAYS
// ============================================================
function renderDays() {
  var lv = state.level, fc = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var cards = "";
  fc.forEach(function(f) {
    var dc = f.delta, dcC = dc > 1 ? "#0080B8" : dc < -1 ? "#C26A1A" : "#8294A8";
    var iconBg = f.snow > 1 ? "linear-gradient(135deg,#C5D4E0,#9EB5C7)" :
                 f.precip > 5 ? "linear-gradient(135deg,#6B8099,#4A6378)" :
                 f.precip > 1 ? "linear-gradient(135deg,#9EBBD4,#7FA3C7)" :
                 f.tMax > 20 ? "linear-gradient(135deg,#FFD875,#F5A623)" :
                 "linear-gradient(135deg,#B4D4E8,#7FA3C7)";
    var c = f.comp;
    var mc = Math.max(c.rainIn, c.directIn, c.baseIn, c.weirOut, c.evapOut, 0.5);
    cards += '<div class="day-detail">' +
      '<div class="day-head">' +
        '<div class="day-icon" style="background:' + iconBg + '">' + wxIcon(f) + '</div>' +
        '<div class="day-name"><div class="n">' + f.dayLong + '</div><div class="d">' + f.dateFull + ' · ' + fmtNum(f.level) + ' m</div></div>' +
        '<div class="day-delta" style="color:' + dcC + '">' + pmNum(dc, 1) + '</div>' +
      '</div>' +
      '<div class="day-grid">' +
        '<div class="day-m"><div class="day-m-l">Temp</div><div class="day-m-v">' + Math.round(f.tMin) + '° bis ' + Math.round(f.tMax) + '°C</div></div>' +
        '<div class="day-m"><div class="day-m-l">Niederschlag</div><div class="day-m-v">' + f.precip.toFixed(1).replace(".",",") + ' mm' + (f.snow > 1 ? ' ❄' : '') + '</div></div>' +
      '</div>' +
      '<div class="day-c-row"><div>Grundzufluss</div><div class="day-c-bar"><div class="day-c-mid"></div><div class="day-c-pos" style="width:' + (c.baseIn/mc*40) + '%;background:#0080B8"></div></div><div class="day-c-v" style="color:#0080B8">+' + c.baseIn.toFixed(2).replace(".",",") + ' cm</div></div>' +
      '<div class="day-c-row"><div>Regen Zufl.</div><div class="day-c-bar"><div class="day-c-mid"></div><div class="day-c-pos" style="width:' + (c.rainIn/mc*40) + '%;background:#00A3E0"></div></div><div class="day-c-v" style="color:#00A3E0">+' + c.rainIn.toFixed(2).replace(".",",") + ' cm</div></div>' +
      '<div class="day-c-row"><div>Seeregen</div><div class="day-c-bar"><div class="day-c-mid"></div><div class="day-c-pos" style="width:' + (c.directIn/mc*40) + '%;background:#5BB8E8"></div></div><div class="day-c-v" style="color:#5BB8E8">+' + c.directIn.toFixed(2).replace(".",",") + ' cm</div></div>' +
      '<div class="day-c-row"><div>Amper ab</div><div class="day-c-bar"><div class="day-c-mid"></div><div class="day-c-neg" style="width:' + (c.weirOut/mc*40) + '%;background:#C26A1A"></div></div><div class="day-c-v" style="color:#C26A1A">−' + c.weirOut.toFixed(2).replace(".",",") + ' cm</div></div>' +
      '<div class="day-c-row"><div>Verdunst.</div><div class="day-c-bar"><div class="day-c-mid"></div><div class="day-c-neg" style="width:' + (c.evapOut/mc*40) + '%;background:#E8A55C"></div></div><div class="day-c-v" style="color:#E8A55C">−' + c.evapOut.toFixed(2).replace(".",",") + ' cm</div></div>' +
      '</div>';
  });
  return '<div style="padding:8px 4px 4px"><h2 style="font-size:20px;font-weight:700;letter-spacing:-0.3px">7-Tage-Detail</h2>' +
    '<p style="font-size:13px;color:#4A5A6E;margin:4px 0 14px;line-height:1.5">Bilanzkomponenten pro Tag in cm: wie viel Regen beiträgt, was über die Amper abfließt usw.</p></div>' +
    cards;
}

// ============================================================
// RENDER: MODEL
// ============================================================
function renderModel() {
  var lv = state.level;
  var fcDef = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, DEFAULTS, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var fcCur = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var totDef = (fcDef[fcDef.length-1].level - lv) * 100;
  var totCur = (fcCur[fcCur.length-1].level - lv) * 100;
  var diff = totCur - totDef;
  var p = state.params;

  return '<div style="padding:8px 4px 4px">' +
    '<h2 style="font-size:20px;font-weight:700;letter-spacing:-0.3px">Hydrologisches Modell</h2>' +
    '<p style="font-size:13px;color:#4A5A6E;margin:4px 0 14px;line-height:1.5">Vereinfachte Wasserbilanz. Schiebregler verstellen die Prognose-Parameter.</p>' +
    '</div>' +
    '<div class="card" style="padding:16px">' +
      '<div style="padding:10px 12px;background:rgba(194,106,26,0.08);border:1px solid rgba(194,106,26,0.2);border-radius:10px;margin-bottom:12px;font-size:12px;color:#7A4100;line-height:1.5">' +
        '<b>Keine amtliche Vorhersage.</b> Konzeptionelles hydrologisches Modell. Besonders unsicher bei Starkregen auf gesättigte Böden, Schneeschmelze und langanhaltendem Dauerregen. Als Orientierung gedacht, nicht für kritische Entscheidungen.' +
      '</div>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px">Modellstruktur</h3>' +
      '<p style="font-size:13px;color:#4A5A6E;line-height:1.55;margin-bottom:10px">Physisch basiertes Speichermodell (HBV-Stil) mit 10-Tage-Spin-up über gemessene Wetterhistorie. Die Bodenfeuchte, der Schneespeicher und das Grundwasser werden aus echten historischen DWD-Daten initialisiert — kein kalter Start.</p>' +
      '<div class="model-eq">' +
        '<span style="color:#8294A8">1.</span> <b>Spin-up</b>: 10 Tage DWD ICON-D2 Historie<br>' +
        '<span style="color:#8294A8">2.</span> <b>Schnee</b> WE-Speicher + Grad-Tag-Schmelze<br>' +
        '<span style="color:#8294A8">3.</span> <b>Boden</b> Eimer 0–80mm · RC dynamisch 8–70%<br>' +
        '<span style="color:#8294A8">4.</span> <b>Grundwasser</b> linearer Speicher (Recession 6%/d)<br>' +
        '<span style="color:#8294A8">5.</span> <b>Routing</b> 5-Tage Unit Hydrograph<br>' +
        '<span style="color:#8294A8">6.</span> <b>Ammer-Live</b> Abfluss Weilheim (wenn verfügbar, Lag 24h)<br>' +

// ============================================================
// SLIDER UPDATE (partial re-render for performance)
// ============================================================
function updateCompare() {
  var lv = state.level;
  var fcDef = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, DEFAULTS, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var fcCur = runForecast(state.weatherDays, state.weatherDays.length - state.forecastStart, lv, state.params, state.ammerQ, state.amperOut, state.ammerPeissQ, state.ammerOberammQ);
  var totDef = (fcDef[fcDef.length-1].level - lv) * 100;
  var totCur = (fcCur[fcCur.length-1].level - lv) * 100;
  var diff = totCur - totDef;
  var chartEl = document.getElementById("compare-chart");
  if (chartEl) chartEl.innerHTML = buildCompareChart(lv, fcDef, fcCur);
  var dEl = document.getElementById("compare-def"); if (dEl) dEl.textContent = pmNum(totDef, 1) + " cm";
  var cEl = document.getElementById("compare-cur"); if (cEl) cEl.textContent = pmNum(totCur, 1) + " cm";
  var diffEl = document.getElementById("compare-diff");
  if (diffEl) {
    diffEl.textContent = pmNum(diff, 1) + " cm";
    diffEl.style.color = Math.abs(diff) < 1 ? "#546478" : diff > 0 ? "#0080B8" : "#C26A1A";
  }
}

function onSliderInput(e) {
  var t = e.target;
  if (t.tagName !== "INPUT" || t.type !== "range") return;
  var key, displayEl, fmt;
  if (t.id === "s-precip") { key = "precipMult"; displayEl = document.getElementById("v-precip"); fmt = function(v){return v.toFixed(2).replace(".",",")+"×";}; }
  else if (t.id === "s-rcpeak") { key = "rcPeak"; displayEl = document.getElementById("v-rcpeak"); fmt = function(v){return (v*100).toFixed(0)+"%";}; }
  else if (t.id === "s-evap") { key = "evapMult"; displayEl = document.getElementById("v-evap"); fmt = function(v){return v.toFixed(2).replace(".",",")+"×";}; }
  else return;
  state.params[key] = parseFloat(t.value);
  setStoredParams(state.params);
  if (displayEl) displayEl.textContent = fmt(state.params[key]);
  updateCompare();
}

// ============================================================
// RE-RENDER
// ============================================================
function rerender() {
  if (!state.level || !state.weather) return;
  document.getElementById("tabbar").classList.add("visible");
  document.getElementById("refreshBtn").classList.add("visible");
  var app = document.getElementById("app");
  if (state.tab === "overview") app.innerHTML = renderOverview();
  else if (state.tab === "days") app.innerHTML = renderDays();
  else if (state.tab === "model") app.innerHTML = renderModel();
}

function setTab(t) {
  state.tab = t;
  setStoredTab(t);
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle("active", tabs[i].dataset.t === t);
  rerender();
  window.scrollTo(0, 0);
}

function resetParams() {
  state.params = Object.assign({}, DEFAULTS);
  setStoredParams(state.params);
  rerender();
}

function handleWelcomeSubmit() {
  var input = document.getElementById("welcomeInput");
  if (!input) return;
  var raw = input.value.trim().replace(",", ".");
  var lv = parseFloat(raw);
  if (isNaN(lv) || lv < 530 || lv > 540) {
    input.style.borderColor = "#C93030";
    input.style.animation = "shake 0.3s";
    setTimeout(function() { input.style.animation = ""; }, 300);
    return;
  }
  setStored(lv, false);
  state.level = lv;
  state.timestamp = Date.now();
  state.isAuto = false;
  state.autoFailed = false;
  document.getElementById("app").innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-main">Lade Prognose...</div></div>';
  // Fetch the SAME set of data sources as loadData() - otherwise renderOverview
  // would see state.weatherDays undefined, state.ammerQ null, etc. and break or
  // render degenerate output. This is the "manual start equivalent" to loadData.
  Promise.all([
    fetchWeather(),
    fetchAmmerDischarge(),
    fetchAmperOutflow(),
    fetchEnsemble(),
    fetchAmmerPeissenberg(),
    fetchAmmerOberammergau()
  ]).then(function(results) {
    var wx = results[0];
    state.weather = wx;
    state.weatherDays = normalizeWeatherData(wx);
    state.forecastStart = Math.max(0, state.weatherDays.length - 7);
    state.ammerQ = results[1];
    state.ammerTimestamp = state.ammerQ != null ? Date.now() : null;
    state.amperOut = results[2];
    state.amperOutTimestamp = state.amperOut != null ? Date.now() : null;
    var ensRaw = results[3];
    var nFc = state.weatherDays.length - state.forecastStart;
    state.ensembleMembers = normalizeEnsembleMembers(ensRaw, state.weatherDays, nFc);
    state.ensembleTimestamp = state.ensembleMembers ? Date.now() : null;
    state.ammerPeissQ = results[4];
    state.ammerPeissTimestamp = state.ammerPeissQ != null ? Date.now() : null;
    state.ammerOberammQ = results[5];
    state.ammerOberammTimestamp = state.ammerOberammQ != null ? Date.now() : null;
    rerender();
  }).catch(function(e) {
    document.getElementById("app").innerHTML = '<div class="loading"><div style="color:#C93030;font-weight:600">Wetter nicht verfügbar</div><div class="loading-step">' + (e && e.message ? e.message : "Unbekannter Fehler") + '</div></div>';
  });
}

function showEditDialog() {
  var stored = getStored();
  var cur = stored ? fmtNum(stored.level) : "";
  var userInput = prompt("Pegelstand eingeben (m NHN, z.B. 532,87):\n\nAktueller Wert von hnd.bayern.de ablesen.", cur);
  if (userInput === null) return;
  var raw = userInput.trim().replace(",", ".");
  var lv = parseFloat(raw);
  if (isNaN(lv) || lv < 530 || lv > 540) {
    alert("Ungültiger Wert. Bitte 530-540 eingeben.");
    return;
  }
  setStored(lv, false);
  state.level = lv;
  state.timestamp = Date.now();
  state.isAuto = false;
  state.autoFailed = false;
  rerender();
}

document.addEventListener("click", function(e) {
  var target = e.target;
  // Look up through parents for data-action or .tab
  while (target && target !== document.body) {
    if (target.dataset && target.dataset.action === "edit") { e.preventDefault(); showEditDialog(); return; }
    if (target.dataset && target.dataset.action === "reset-params") { e.preventDefault(); resetParams(); return; }
    if (target.dataset && target.dataset.action === "tab-days") { e.preventDefault(); setTab("days"); return; }
    if (target.id === "welcomeBtn") { e.preventDefault(); handleWelcomeSubmit(); return; }
    if (target.id === "refreshBtn") { e.preventDefault(); loadData(true); return; }
    if (target.classList && target.classList.contains("tab") && target.dataset && target.dataset.t) { e.preventDefault(); setTab(target.dataset.t); return; }
    target = target.parentNode;
  }
});

document.addEventListener("input", onSliderInput);

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("welcomeInput")) {
    e.preventDefault();
    handleWelcomeSubmit();
  }
});

// ============================================================
// MAIN LOAD
// ============================================================
function loadData(forceRefresh) {
  // Race-condition guard: cancel any in-flight request
  state.currentRequestId++;
  var requestId = state.currentRequestId;
  
  // Abort prior controller if exists
  if (state.currentAbort) state.currentAbort.abort();
  var abortCtrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
  state.currentAbort = abortCtrl;
  var signal = abortCtrl ? abortCtrl.signal : undefined;
  
  var btn = document.getElementById("refreshBtn");
  if (btn) btn.classList.add("loading");

  var stored = getStored();
  var storedAge = stored ? (Date.now() - stored.timestamp) / 60000 : Infinity;
  var shouldFetch = forceRefresh || !stored || storedAge > 30;

  if (!stored && !state.level) {
    document.getElementById("app").innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-main">Lade Ammersee-Daten</div><div class="loading-step" id="loadStep">Starte...</div></div>';
  }

  var autoFailed = false;
  
  // Fetch pegel
  var pegelPromise = shouldFetch ? fetchPegelAuto().then(function(lv) {
    if (requestId !== state.currentRequestId) return;  // stale response
    // Sanity check: reject only if NEW value differs >20cm AND stored looks clean
    if (stored && Math.abs(lv - stored.level) > 0.20) {
      // If cached value is exactly a Meldestufe, it's probably a previous parse error → trust new
      if (isSuspiciousLevel(stored.level)) {
        console.warn("Cached value " + stored.level + " = Meldestufe (suspicious). Accepting new: " + lv);
        // Fall through to accept new value
      } else {
        console.warn("Pegel jump >20cm: cached=" + stored.level + " new=" + lv + " - keeping cached");
        autoFailed = true;
        state.level = stored.level;
        state.timestamp = stored.timestamp;
        state.isAuto = stored.auto;
        return;
      }
    }
    setStored(lv, true);
    state.level = lv;
    state.timestamp = Date.now();
    state.isAuto = true;
  }).catch(function(e) {
    if (requestId !== state.currentRequestId) return;
    autoFailed = true;
    if (stored) {
      state.level = stored.level;
      state.timestamp = stored.timestamp;
      state.isAuto = stored.auto;
    }
  }) : Promise.resolve().then(function() {
    if (stored) {
      state.level = stored.level;
      state.timestamp = stored.timestamp;
      state.isAuto = stored.auto;
    }
  });

  pegelPromise.then(function() {
    if (requestId !== state.currentRequestId) return;
    state.autoFailed = autoFailed && !!stored;
    if (!state.level) {
      renderWelcome(autoFailed);
      if (btn) btn.classList.remove("loading");
      return;
    }
    // Fetch weather + Ammer chain (Weilheim + upstream) + Amper out + Ensemble in parallel
    return Promise.all([
      fetchWeather(signal),
      fetchAmmerDischarge(signal),
      fetchAmperOutflow(signal),
      fetchEnsemble(signal),
      fetchAmmerPeissenberg(signal),
      fetchAmmerOberammergau(signal)
    ]).then(function(results) {
      if (requestId !== state.currentRequestId) return;
      var wx = results[0];
      var ammerQ = results[1];
      var amperOut = results[2];
      var ensRaw = results[3];
      var ammerPeissQ = results[4];
      var ammerOberammQ = results[5];
      state.weather = wx;
      state.weatherDays = normalizeWeatherData(wx);
      var totalDays = state.weatherDays.length;
      state.forecastStart = Math.max(0, totalDays - 7);
      state.ammerQ = ammerQ;
      state.ammerTimestamp = ammerQ != null ? Date.now() : null;
      state.ammerPeissQ = ammerPeissQ;
      state.ammerPeissTimestamp = ammerPeissQ != null ? Date.now() : null;
      state.ammerOberammQ = ammerOberammQ;
      state.ammerOberammTimestamp = ammerOberammQ != null ? Date.now() : null;
      state.amperOut = amperOut;
      state.amperOutTimestamp = amperOut != null ? Date.now() : null;
      // Normalize ensemble members (if available); graceful fallback on failure
      var nFc = state.weatherDays.length - state.forecastStart;
      state.ensembleMembers = normalizeEnsembleMembers(ensRaw, state.weatherDays, nFc);
      state.ensembleTimestamp = state.ensembleMembers ? Date.now() : null;
      rerender();
      if (btn) btn.classList.remove("loading");
    }).catch(function(e) {
      if (requestId !== state.currentRequestId) return;
      document.getElementById("app").innerHTML = '<div class="loading"><div style="color:#C93030;font-weight:600">Wetter nicht verfügbar</div><div class="loading-step">' + (e.message || "Unbekannter Fehler") + '</div></div>';
      if (btn) btn.classList.remove("loading");
    });
  });
}

state.tab = getStoredTab();
state.params = getStoredParams();

loadData(false);
// Refresh when user returns to the tab or after 30min (only if visible)
var lastRefresh = Date.now();
document.addEventListener("visibilitychange", function() {
  if (!document.hidden) {
    var ageMin = (Date.now() - lastRefresh) / 60000;
    if (ageMin > 30) {
      lastRefresh = Date.now();
      loadData(true);
    }
  }
});
window.addEventListener("pageshow", function(e) { if (e.persisted) loadData(false); });

// Global error handler
window.addEventListener("error", function(ev) {
  var app = document.getElementById("app");
  if (app && !app.innerHTML.includes("welcome")) {
    app.innerHTML = '<div class="loading"><div style="color:#C93030;font-weight:600;font-size:15px">Script-Fehler</div><div class="loading-step">' + (ev.message || "Unbekannter Fehler") + '<br>Zeile: ' + (ev.lineno || "?") + '</div><button onclick="loadData(true)" style="margin-top:14px;padding:8px 16px;background:white;border:1px solid #ccc;border-radius:10px;font:inherit;cursor:pointer">Neu laden</button></div>';
  }
});
</script>
